<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<title>Rune Circle Combat — Prototype</title>
<style>
  @font-face {
    font-family: "RuneDisplay";
    src: url("assets/rune_font.otf") format("opentype");
    font-display: swap;
  }
  :root {
    color-scheme: dark;
    /* Display face for spell words, titles and rune labels. Readability comes
       first: a widely-available classical serif renders on essentially every
       device. The runic "RuneDisplay" stays in the stack as a deliberately
       low-priority fallback — it only surfaces where none of the readable
       serifs exist. */
    --display-font: "Palatino Linotype", "Book Antiqua", Georgia, "RuneDisplay", serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #141018;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #f5f2ff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app { width: 100%; height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

  /* Loadout screen */
  .loadout-screen { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .loadout-screen h1 {
    font-family: var(--display-font);
    font-size: clamp(22px, 6vw, 28px); margin-bottom: 20px; text-align: center;
    letter-spacing: 1px;
  }
  .cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; width: min(320px, 85vw); }
  .card {
    background: linear-gradient(160deg, #262033, #1d1827);
    border: 1px solid #3a3550; border-radius: 12px;
    padding: 14px 20px; text-align: center;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
  }
  .card .it {
    font-family: var(--display-font);
    font-size: 21px; font-weight: 600; color: #f2c14e; letter-spacing: 1px;
  }
  .card .dash { color: rgba(242, 193, 78, 0.45); margin: 4px 0; font-size: 12px; }
  .card .de { font-size: 18px; color: #eae6f5; }
  .fight-btn {
    font-size: 22px; padding: 16px 0; width: min(320px, 85vw);
    border-radius: 12px; border: none;
    background: linear-gradient(180deg, #ffd571, #f2c14e);
    color: #141018; font-weight: 700; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 0 24px rgba(242, 193, 78, 0.25);
  }
  .fight-btn:active { background: #ffd571; }
  .mode-btn {
    background: rgba(242, 193, 78, 0.07);
    border: 1px solid rgba(242, 193, 78, 0.65); color: #f2c14e;
    border-radius: 9px; padding: 10px 16px; font-weight: 700;
    font-size: clamp(13px, 3.5vw, 16px); letter-spacing: 1px; cursor: pointer;
  }
  .mode-btn:active { background: rgba(242, 193, 78, 0.15); }
  .loadout-screen .mode-btn { margin-top: 20px; }

  /* Combat screen — banner (fight) on top, rune circle filling the rest */
  .combat-screen {
    position: relative;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    width: 100%; height: 100%;
  }
  .combat-screen::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: rgba(229, 72, 77, 0); transition: none;
  }
  .combat-screen.wrong-flash::after { background: rgba(229, 72, 77, 0.35); }

  .scene-wrap {
    flex: 0 0 auto;
    width: 100%;
    overflow: hidden;
    background: #17131e;
    line-height: 0;
  }
  canvas.scene {
    display: block;
    image-rendering: pixelated;
  }
  .hud-under {
    flex: 0 0 auto;
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px max(3vw, env(safe-area-inset-left)) 8px max(3vw, env(safe-area-inset-right));
    background: #1b1624;
    border-top: 1px solid #3a3550;
    border-bottom: 1px solid #3a3550;
  }
  .hero-hud { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; min-width: 40%; }
  .enemy-hud { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; min-width: 40%; }
  .combat-mode-row {
    flex: 0 0 auto;
    display: flex; justify-content: center;
    padding: 8px 0;
  }
  .bar-label {
    font-size: clamp(10px, 2.7vw, 13px); letter-spacing: 0.5px; color: #b9b3c8; font-weight: 700;
  }
  .bar-label span { color: #efeaff; font-weight: 400; }
  .bar-sub { font-size: clamp(11px, 3vw, 14px); color: #f2c14e; font-weight: 700; }
  .hp-track {
    width: clamp(120px, 40vw, 300px); height: 12px;
    background: #241f2f; border: 1px solid #3a3550; border-radius: 6px; overflow: hidden;
  }
  .hp-fill { height: 100%; transition: width 180ms linear; }
  .hp-track.hero .hp-fill { background: linear-gradient(90deg, #2f9e57, #5ecf8f); }
  .hp-track.enemy .hp-fill { background: linear-gradient(90deg, #9a3550, #e5545f); }
  .coin { color: #f2c14e; }
  .gold-line { font-size: clamp(13px, 3.6vw, 17px); color: #f2c14e; font-weight: 700; }
  .windup-track {
    width: clamp(90px, 26vw, 280px); height: 14px;
    background: #241f2f; border: 1px solid #3a3550; border-radius: 7px;
    overflow: hidden;
  }
  .windup-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #a83a49, #e5484d, #f2784e);
  }
  .windup-track.warp-slow .windup-fill { background: linear-gradient(90deg, #3d6fb8, #4d9fff); }
  .windup-track.warp-freeze .windup-fill { background: #4d9fff; }

  /* Time-warp feedback while a rune is selected */
  .time-veil {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0; transition: opacity 120ms linear;
  }
  .time-veil.slowmo { opacity: 1; background: radial-gradient(ellipse at center, rgba(77, 159, 255, 0.05), rgba(77, 159, 255, 0.16)); }
  .time-veil.freeze { opacity: 1; background: radial-gradient(ellipse at center, rgba(77, 159, 255, 0.10), rgba(77, 159, 255, 0.26)); }
  .time-chip {
    font-size: clamp(11px, 3vw, 13px); font-weight: 700; letter-spacing: 0.5px;
    visibility: hidden; min-height: 1.2em;
  }
  .time-chip.rt { visibility: visible; color: #e5484d; }
  .time-chip.warped { visibility: visible; color: #8fc2ff; }
  .time-chip.idle { visibility: visible; color: #6d6684; font-weight: 600; }

  svg.arena {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: block;
    /* Runes are dragged with the pointer — don't let a drag scroll/pan the page */
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  /* The static arcane wheel is a baked high-fidelity image; live SVG on top
     draws only what changes: word bubbles, chords, filigree, sparks, and the
     rotating inner script ring */
  .glyph {
    fill: none; stroke: #7ff0ed; stroke-width: 1.7; opacity: 0.6;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .inner-band .glyph { stroke-width: 1.4; }
  .spark { fill: url(#sparkGrad); }
  .rune .halo { opacity: 0; fill: #f2c14e; transition: opacity 150ms linear; pointer-events: none; }
  .rune.selected .halo { opacity: 0.4; }
  .rune.matched .halo { opacity: 0.22; fill: #5ecf8f; }
  /* Word bubbles are transparent wells over the baked sockets: a whisper of
     dark fill for legibility, state shown by ring tint */
  .rune .body { stroke-width: 1.5; cursor: pointer; transition: fill 100ms linear, stroke 100ms linear; }
  .rune.unmatched .body { fill: rgba(8, 13, 18, 0.30); stroke: rgba(127, 244, 241, 0.35); }
  .rune.selected .body { fill: rgba(242, 193, 78, 0.16); stroke: #ffe9b0; stroke-width: 2.5; }
  .rune.matched .body { fill: rgba(94, 207, 143, 0.14); stroke: rgba(143, 231, 180, 0.8); }
  .rune text {
    font-family: var(--display-font);
    fill: #e8fffe; font-size: 19px; letter-spacing: 0.5px; font-weight: 700;
    paint-order: stroke; stroke: rgba(8, 13, 18, 0.9); stroke-width: 3px;
    text-anchor: middle; dominant-baseline: central;
    pointer-events: none;
  }
  .rune.selected text { fill: #ffe9b0; }
  .rune.matched text { fill: #b9f2d2; }
  /* The line trailing from a held rune to the pointer while dragging a pair */
  .drag-line {
    stroke: #ffe9b0; stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 6 8; opacity: 0; pointer-events: none;
    filter: url(#softGlow);
  }
  .drag-line.active { opacity: 0.85; }
  .chord-glow { stroke: #4de3e0; stroke-width: 9; stroke-linecap: round; opacity: 0.3; }
  .chord { stroke: #8ff7f3; stroke-width: 3.5; stroke-linecap: round; }
  .chord.flash { stroke: #ffffff; stroke-width: 6; }
  .chord-glow.flash { stroke: #ffffff; opacity: 0.6; }
  /* Filigree sub-lines for every possible chord: pulse faintly, burst white
     on a correct match, then stay lit alongside their main line */
  .sub-group { stroke: #4de3e0; }
  .sub-group.burst { stroke: #ffffff; }
  .sub-group * { fill: none; stroke-linecap: round; }

  /* Post-death vocab quiz */
  .quiz-screen { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); text-align: center; }
  .quiz-progress { font-size: 13px; color: #8a8398; letter-spacing: 0.5px; margin-bottom: 14px; }
  .quiz-screen h1 {
    font-family: var(--display-font);
    font-size: clamp(24px, 6.5vw, 32px); letter-spacing: 2px; color: #7ff0ed;
    text-shadow: 0 0 22px rgba(77, 227, 224, 0.45); margin-bottom: 18px;
  }
  .quiz-prompt { font-size: clamp(17px, 5vw, 22px); color: #cfc9de; margin-bottom: 26px; }
  .quiz-word {
    font-family: var(--display-font);
    color: #f2c14e; font-weight: 700; letter-spacing: 1px;
  }
  .quiz-opts { display: flex; flex-direction: column; gap: 12px; width: min(340px, 88vw); margin: 0 auto; }
  .quiz-opt {
    font-size: 19px; padding: 15px; border-radius: 11px;
    background: linear-gradient(160deg, #241d33, #1a1526);
    border: 1px solid #4de3e0; color: #efeaff; cursor: pointer;
    transition: background 120ms, border-color 120ms;
  }
  .quiz-opt:active { background: #2a2340; }
  .quiz-opt.correct { background: #1f6d43; border-color: #5ecf8f; color: #eafff2; }
  .quiz-opt.wrong { background: #6d2330; border-color: #e5545f; color: #ffe9ec; }
  .quiz-opt.faded { opacity: 0.4; }

  /* Upgrade shop (stage 2) */
  .upgrade-screen { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); text-align: center; }
  .upgrade-screen h1 {
    font-family: var(--display-font);
    font-size: clamp(26px, 7vw, 36px); letter-spacing: 2px; color: #7ff0ed;
    text-shadow: 0 0 22px rgba(77, 227, 224, 0.5); margin-bottom: 6px;
  }
  .gold-big { font-size: clamp(18px, 5vw, 24px); color: #f2c14e; font-weight: 700; margin-bottom: 22px; }
  .upg-cards { display: flex; flex-direction: column; gap: 14px; width: min(340px, 88vw); margin-bottom: 18px; }
  .upg-card {
    display: flex; flex-direction: column; gap: 6px; align-items: center;
    background: linear-gradient(160deg, #241d33, #1a1526);
    border: 1px solid #4de3e0; border-radius: 12px; padding: 14px 18px;
    color: #efeaff; cursor: pointer; box-shadow: 0 0 18px rgba(77, 227, 224, 0.12);
  }
  .upg-card:active { background: #2a2340; }
  .upg-card.poor { opacity: 0.5; border-color: #3a3550; box-shadow: none; }
  .upg-name { font-size: 20px; font-weight: 700; color: #7ff0ed; letter-spacing: 0.5px; }
  .upg-stat { font-size: 15px; color: #cfc9de; }
  .upg-cost { font-size: 16px; font-weight: 700; color: #f2c14e; }
  .upg-hp { font-size: 13px; color: #8a8398; margin-bottom: 18px; letter-spacing: 0.5px; }
  .next-wave-btn { background: linear-gradient(180deg, #7ff0ed, #4de3e0); box-shadow: 0 0 24px rgba(77, 227, 224, 0.3); }

  /* End screens */
  .end-screen { cursor: pointer; padding: 16px; text-align: center; }
  .end-screen h1 {
    font-family: var(--display-font);
    font-size: clamp(32px, 9vw, 44px); margin-bottom: 12px; letter-spacing: 2px;
  }
  .end-screen h1.victory { color: #f2c14e; text-shadow: 0 0 28px rgba(242, 193, 78, 0.45); }
  .end-screen h1.defeat { color: #e5484d; text-shadow: 0 0 28px rgba(229, 72, 77, 0.4); }
  .end-screen p { font-size: clamp(15px, 4.5vw, 18px); color: #cfc9de; margin: 4px 0; }
  .end-screen .dim { color: #8a8398; font-size: clamp(13px, 3.6vw, 15px); }
  .end-screen .end-flavor { color: #b9b3c8; margin: 18px auto 24px; max-width: 320px; }
  .study-btn { background: linear-gradient(180deg, #7ff0ed, #4de3e0); box-shadow: 0 0 24px rgba(77, 227, 224, 0.3); }
  .end-screen .hint { margin-top: 24px; color: #8a8398; }
</style>
</head>

<div id="app"></div>
<script>
"use strict";

// ---------------------------------------------------------------------------
// CONFIG — every gameplay number, flag, and color lives here.
// ---------------------------------------------------------------------------
const CONFIG = {
  windupDurationMs: 8000,
  slowMoFactor: 0.3,
  // Hero: small HP pool, starts weak, upgrades bought with gold
  heroBaseHP: 10,
  heroBaseDmg: 3,
  dmgPerLevel: 2,
  hpPerLevel: 25,
  dmgUpgradeBaseCost: 30,

  // runs on permanent build upgrades
  quizQuestionCount: 6,
  quizOptionCount: 4,
  goldPerCorrect: 12,
  quizWaveBonus: 5, // bonus gold per question, scaled by how far you got
  quizFeedbackMs: 650,
  // Endless skeleton waves, scaling in HP and damage
  enemyBaseHP: 10,
  enemyHPGrowth: 1.45,
  enemyBaseDmg: 6,
  enemyDmgGrowth: 1.3,
  wrongMatchDmgFactor: 0.5, // wrong match costs this fraction of enemy damage
  enemyEnterMs: 900,
  enemyDeathMs: 600,
  runeCount: 6,
  pairsPerLoadout: 3,
  // When false, casting a spell does NOT reset the skeleton's attack windup, so
  // its attack timer keeps ticking and it lands hits at a steady cadence (constant DPS).
  staggerOnCast: false,
  wrongFlashDurationMs: 200,
  shapeFlashDurationMs: 500,
  fireballFlightMs: 450,
  fireballImpactMs: 280,
  castChargeMs: 420,
  runePuffMs: 260,
  circleCenter: { x: 300, y: 300 },
  circleRadius: 215,
  runeRadius: 48,
  colors: {
    background: "#141018",
    runeUnmatched: "#3a3550",
    runeSelected: "#f2c14e",
    runeMatched: "#5ecf8f",
    chord: "#4de3e0",
    chordFlash: "#ffffff",
    wrongFlash: "rgba(229,72,77,0.35)",
    heartFull: "#e5484d",
    heartEmpty: "#3a3540",

};

const MODE_ORDER = ["REAL_TIME", "SLOW_MO", "FREEZE"];
const MODE_LABELS = { REAL_TIME: "REAL-TIME", SLOW_MO: "SLOW-MO", FREEZE: "FREEZE" };

// Each entry pairs the Italian word (`it`, shown in the circle) with its German

let state = null;

function freshState() {
  return {
    screen: "combat",       // combat | quiz | upgrade | defeat
    mode: "REAL_TIME",
    runes: [],               // {id, pairId, lang, word, x, y, matchState}
    selectedRuneId: null,
    // Drag-to-connect: press a rune, drag to its pair, release to match.
    dragActive: false,       // a pointer drag is in progress
    dragMoved: false,        // the pointer moved past the tap threshold since pressing
    dragPointer: null,       // {x, y} pointer position in SVG (viewBox) coords, for the live line
    chords: [],              // {x1,y1,x2,y2,pairId}
    currentPairs: [],
    // Hero: an HP pool (no discrete hearts) that upgrades persist across waves
    heroMaxHP: CONFIG.heroBaseHP,
    heroHP: CONFIG.heroBaseHP,
    heroDmg: CONFIG.heroBaseDmg,
    dmgLevel: 0,
    hpLevel: 0,
    gold: 0,
    // Endless waves
    wave: 1,
    enemyMaxHP: CONFIG.enemyBaseHP,
    enemyHP: CONFIG.enemyBaseHP,
    enemyDmg: CONFIG.enemyBaseDmg,
    enemyPhase: "enter",      // enter | alive | dying
    enemyPhaseAt: 0,
    pendingWaveEnd: false,    // set when a lethal cast lands; ends the wave after the cast anim
    windup: 0,
    poolIndex: 0,
    wrongMatchCount: 0,
    // Post-death vocab quiz
    quizList: [],
    quizIndex: 0,

}

function newGame() {
  const preservedMode = state ? state.mode : "REAL_TIME"; // DECISION: mode is a tester tool, preserved across restart
  state = freshState();
  state.mode = preservedMode;
  applySavedProgress();
}

// ---------------------------------------------------------------------------
// Persistence — meta-progression (gold + upgrade levels) survives reloads via
// localStorage. Only the source-of-truth numbers are stored; hero DMG and max
// HP are always re-derived from the levels, so tuning CONFIG stays authoritative.
// ---------------------------------------------------------------------------
const SAVE_KEY = "incanto.save.v1";

function saveProgress() {
  if (!state) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      gold: state.gold,
      dmgLevel: state.dmgLevel,
      hpLevel: state.hpLevel,
    }));
  } catch (e) { /* storage unavailable (private mode/quota) — play without saving */ }
}

function loadProgress() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return (data && typeof data === "object") ? data : null;
  } catch (e) { return null; }
}

function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) { /* ignore */ }
}

// Overlay any persisted meta-progression onto a freshly built state.
function applySavedProgress() {
  const data = loadProgress();
  if (!data) return;
  const asCount = (v) => (Number.isFinite(v) ? Math.max(0, Math.floor(v)) : 0);
  state.gold = asCount(data.gold);
  state.dmgLevel = asCount(data.dmgLevel);
  state.hpLevel = asCount(data.hpLevel);
  state.heroDmg = CONFIG.heroBaseDmg + state.dmgLevel * CONFIG.dmgPerLevel;
  state.heroMaxHP = CONFIG.heroBaseHP + state.hpLevel * CONFIG.hpPerLevel;
  state.heroHP = state.heroMaxHP;
}

// Enemy scaling: each wave's skeleton has more HP and hits harder
function enemyHPForWave(w) {
  return Math.round(CONFIG.enemyBaseHP * Math.pow(CONFIG.enemyHPGrowth, w - 1));
}
function enemyDmgForWave(w) {
  return Math.round(CONFIG.enemyBaseDmg * Math.pow(CONFIG.enemyDmgGrowth, w - 1));
}
function dmgUpgradeCost() {
  return Math.round(CONFIG.dmgUpgradeBaseCost * Math.pow(CONFIG.upgradeCostGrowth, state.dmgLevel));
}
function hpUpgradeCost() {
  return Math.round(CONFIG.hpUpgradeBaseCost * Math.pow(CONFIG.upgradeCostGrowth, state.hpLevel));
}

// Send in a skeleton for wave `w`, with fresh words to trace.
function startWave(w) {
  state.wave = w;
  state.enemyMaxHP = enemyHPForWave(w);
  state.enemyHP = state.enemyMaxHP;
  state.enemyDmg = enemyDmgForWave(w);
  state.enemyPhase = "enter";
  state.enemyPhaseAt = performance.now();
  state.pendingWaveEnd = false;
  state.windup = 0;
  state.castAt = 0;
  state.castChords = null;
  populateCircle(drawLoadout());
}

// A run: fixed build (persists between runs), fight escalating waves until
// death. Build/gold are meta-progression and are NOT reset here.
function startRun() {
  state.wave = 1;
  state.heroHP = state.heroMaxHP;
  state.wrongMatchCount = 0;
  state.runStartMs = performance.now();
  state.screen = "combat";
  startWave(1);
}

// ---------------------------------------------------------------------------
// Geometry
// ---------------------------------------------------------------------------
function layoutCircle(n) {
  // DECISION: angle slots are fixed (stable layout); only word-to-slot assignment is shuffled.
  const { x: cx, y: cy } = CONFIG.circleCenter;
  const r = CONFIG.circleRadius;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI) / n;
    positions.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return positions;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---------------------------------------------------------------------------
// Pixel-art dungeon scene.
// DECISION: scene art comes from a professional CC0 sprite sheet
// (assets/dungeon_tiles.png — "16x16 DungeonTileset II" by 0x72, coordinates
// in assets/tiles_list.txt). Frames are prerendered to offscreen canvases and
// composited each frame onto a <canvas> whose backing store is sized for
// INTEGER device-pixel scaling (a fractional scale makes art pixels render at
// uneven widths — the "warped" look). Idle/fountain animations play from the
// sheet's own frames; the fireball and glows remain procedural.
// ---------------------------------------------------------------------------
const TILE = 16;
// Scene geometry, in tile rows. A taller wall (one top-cap row + several mid
// rows) gives the arena more vertical presence; the floor rows sit below it.
const WALL_ROWS = 2;   // 1 top-cap row + 1 mid row of wall face (kept low)
const FLOOR_ROWS = 3;  // floor rows below the wall (roomy foreground)
const FLOOR_Y = WALL_ROWS * TILE;                    // wall→floor transition line
const SCENE_H = (WALL_ROWS + FLOOR_ROWS) * TILE;     // native art pixel height

const FIREBALL_SPRITE = [
  "....OOO...",
  "..TOYYYO..",
  "TTOYYCCYO.",
  ".TOyYCCYO.",
  "..TOYYYOO.",
  "....OOO...",
];

function drawSpritePx(ctx, map, palette, ox, oy) {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {
      const c = map[y][x];
      if (c !== "." && palette[c]) {
        ctx.fillStyle = palette[c];
        ctx.fillRect(ox + x, oy + y, 1, 1);
      }
    }
  }
}

function spriteToCanvas(map, palette) {
  const cv = document.createElement("canvas");
  cv.width = map[0].length;
  cv.height = map.length;
  drawSpritePx(cv.getContext("2d"), map, palette, 0, 0);
  return cv;
}

// Radial glow prerendered once; blitted additively per frame
function glowToCanvas(radius, rgb, maxAlpha) {
  const size = radius * 2 + 1;
  const cv = document.createElement("canvas");
  cv.width = size;
  cv.height = size;
  const ctx = cv.getContext("2d");
  for (let py = -radius; py <= radius; py++) {
    for (let px = -radius; px <= radius; px++) {
      const dist = Math.sqrt(px * px + py * py);
      if (dist > radius) continue;
      const a = maxAlpha * (1 - dist / radius);
      if (a < 0.015) continue;
      ctx.fillStyle = `rgba(${rgb}, ${a.toFixed(3)})`;
      ctx.fillRect(radius + px, radius + py, 1, 1);
    }
  }
  return cv;
}

// Soft elliptical shadow prerendered once; blitted normally under props/fighters
function shadowToCanvas(rx, ry, maxAlpha) {
  const w = rx * 2 + 1, h = ry * 2 + 1;
  const cv = document.createElement("canvas");
  cv.width = w;
  cv.height = h;
  const ctx = cv.getContext("2d");
  for (let py = -ry; py <= ry; py++) {
    for (let px = -rx; px <= rx; px++) {
      const dist = Math.sqrt((px / rx) ** 2 + (py / ry) ** 2);
      if (dist > 1) continue;
      const a = maxAlpha * (1 - dist);
      if (a < 0.01) continue;
      ctx.fillStyle = `rgba(8, 5, 12, ${a.toFixed(3)})`;
      ctx.fillRect(rx + px, ry + py, 1, 1);
    }
  }
  return cv;
}

// Deterministic hash so tile variation is stable across rebuilds
function tileHash(a, b) {
  let h = (a * 73856093) ^ (b * 19349663);
  h = (h ^ (h >> 13)) * 1274126177;
  return Math.abs(h ^ (h >> 16));
}

// Cut one frame of a sheet entry to its own canvas; optionally flip or
// recolor to a flat silhouette (for the hit flash).
function cutFrame(img, rect, frame, { flip = false, silhouette = null } = {}) {
  const cv = document.createElement("canvas");
  cv.width = rect.w;
  cv.height = rect.h;
  const ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  if (flip) {
    ctx.translate(rect.w, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(img, rect.x + frame * rect.w, rect.y, rect.w, rect.h, 0, 0, rect.w, rect.h);
  if (silhouette) {
    ctx.globalCompositeOperation = "source-in";
    ctx.fillStyle = silhouette;
    ctx.fillRect(flip ? -rect.w : 0, 0, rect.w * 2, rect.h);
  }
  return cv;
}

// Shift the staff's green gem to the rune's teal, preserving each pixel's
// brightness so the shine and shading survive. Wood (red-dominant) and the
// cream highlight (unsaturated) are left untouched.
function recolorStaffGem(cv) {
  const ctx = cv.getContext("2d");
  const img = ctx.getImageData(0, 0, cv.width, cv.height);
  const p = img.data;
  for (let i = 0; i < p.length; i += 4) {
    const r = p[i], g = p[i + 1], b = p[i + 2];
    if (p[i + 3] === 0) continue;
    // green-dominant and reasonably saturated == gem
    if (g > r + 12 && g > b + 12) {
      const lum = (r + g + b) / 3;
      p[i] = Math.round(lum * 0.32);
      p[i + 1] = Math.round(Math.min(255, lum * 1.02));
      p[i + 2] = Math.round(Math.min(255, lum * 1.0));
    }
  }
  ctx.putImageData(img, 0, 0);
  return cv;
}

const tilesetImg = new Image();
tilesetImg.src = "assets/dungeon_tiles.png";
tilesetImg.onload = () => {
  scene = null; // force rebuild now that frames can be cut
};

let ASSETS = null;

function buildAssets() {
  const f = CONFIG.colors.fireball;
  const d = CONFIG.colors.dungeon;
  const frames = (rect, opts) =>
    Array.from({ length: rect.f || 1 }, (_, i) => cutFrame(tilesetImg, rect, i, opts));
  ASSETS = {
    wizard: frames(SHEET.wizardIdle),
    staff: recolorStaffGem(cutFrame(tilesetImg, SHEET.staffMagic, 0)),
    skelet: frames(SHEET.skeletIdle, { flip: true }),
    skeletHit: frames(SHEET.skeletIdle, { flip: true, silhouette: "#fff3d0" }),
    fountainMid: frames(SHEET.fountainMidRed),
    fountainBasin: frames(SHEET.fountainBasinRed),
    fireball: spriteToCanvas(FIREBALL_SPRITE, f),
    glowFountain: glowToCanvas(15, d.glowRGB, d.glowAlpha),
    glowFireball: glowToCanvas(9, f.glowRGB, f.glowAlpha),
    // Large soft light pools the fountains/rune cast across the scene, and
    // grounding shadows for the fighters — the "sharper look" atmosphere pass.
    poolWarm: glowToCanvas(34, d.glowRGB, 0.34),
    poolCool: glowToCanvas(22, CONFIG.colors.sceneRune.glowRGB, 0.30),
    shadow: shadowToCanvas(9, 3, 0.5),
    shadowSm: shadowToCanvas(8, 3, 0.45),
  };
}

// Scene state: canvas element, integer pixel scale, layout, cached background
let scene = null;

function setupScene(cv) {
  if (!tilesetImg.complete || !tilesetImg.naturalWidth) return false;
  if (!ASSETS) buildAssets();
  const dpr = window.devicePixelRatio || 1;
  const cssW = (cv.parentElement && cv.parentElement.clientWidth) || window.innerWidth || 360;
  const maxCssH = (window.innerHeight || 800) * 0.36;
  // Integer device-pixel scale: every art pixel renders at exactly `px`
  // device pixels, eliminating uneven pixel widths.
  let px = Math.round((cssW * dpr) / 200);
  const maxPxByH = Math.floor((maxCssH * dpr) / SCENE_H);
  px = Math.max(1, Math.min(px || 1, maxPxByH || 1, 10));
  const artW = Math.ceil((cssW * dpr) / px);
  cv.width = artW;
  cv.height = SCENE_H;
  cv.style.width = `${(artW * px) / dpr}px`;
  cv.style.height = `${(SCENE_H * px) / dpr}px`;

  const margin = Math.max(10, Math.round(artW * 0.08));
  const wiz = SHEET.wizardIdle;
  const skl = SHEET.skeletIdle;
  // Fighters stand in the middle of the floor, not right up against the wall
  const feetY = FLOOR_Y + Math.round((SCENE_H - FLOOR_Y) * 0.66);
  const wizard = { x: margin, y: feetY - wiz.h };
  const skelet = { x: artW - margin - skl.w, y: feetY - skl.h };
  scene = {
    cv,
    artW,
    wizard,
    skelet,
    fountains: [Math.round(artW * 0.32 / TILE) * TILE, Math.round(artW * 0.68 / TILE) * TILE],
    // The traced rune stands upright at arm's reach in front of the wizard,
    // facing the enemy. Our camera sees it from the side, so the circle
    // foreshortens horizontally: a tall, narrow ellipse (height > width).
    rune: { cx: wizard.x + wiz.w + 9, cy: wizard.y + 8, rx: 7, ry: 14 },
    skelChest: { x: skelet.x + skl.w / 2, y: skelet.y + 9 },
    bg: null,
  };
  scene.bg = buildBg(artW);
  return true;
}

function buildBg(artW) {
  const d = CONFIG.colors.dungeon;
  const cv = document.createElement("canvas");
  cv.width = artW;
  cv.height = SCENE_H;
  const ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const blit = (rect, dx, dy) =>
    ctx.drawImage(tilesetImg, rect.x, rect.y, rect.w, rect.h, dx, dy, rect.w, rect.h);

  ctx.fillStyle = d.background;
  ctx.fillRect(0, 0, artW, SCENE_H);

  const cols = Math.ceil(artW / TILE);

  // Wall: a top-cap row, then mid rows filling straight down to the floor line
  for (let c = 0; c < cols; c++) {
    blit(SHEET.wallTopMid, c * TILE, 0);
    for (let y = TILE; y < FLOOR_Y; y += TILE) blit(SHEET.wallMid, c * TILE, y);
  }

  // Floor: mostly floor_1 with stable variation (drawn before the props that
  // stand on it, so their base tiles read as resting on the floor)
  for (let r = 0; r * TILE + FLOOR_Y < SCENE_H; r++) {
    for (let c = 0; c < cols; c++) {
      const h = tileHash(r, c);
      const tile = h % 4 === 0 ? SHEET.floors[1 + (h % (SHEET.floors.length - 1))] : SHEET.floors[0];
      blit(tile, c * TILE, FLOOR_Y + r * TILE);
    }
  }

  // Contact shadow: the wall casts a soft gradient onto the floor just below
  // the seam, giving a crisp wall→floor transition instead of a muddy tile join.
  for (let y = 0; y < 6; y++) {
    ctx.fillStyle = `rgba(0, 0, 0, ${(0.42 * (1 - y / 6)).toFixed(3)})`;
    ctx.fillRect(0, FLOOR_Y + y, artW, 1);
  }

  // Columns near the edges: capital on top, shaft down the full wall, and the
  // base tile planted on the first floor row so the pillar stands on the floor
  // with its bottom tile aligned to the wall→floor transition.
  for (const cx of [TILE, (cols - 2) * TILE]) {
    blit(SHEET.wallColumnTop, cx, 0);
    for (let y = TILE; y < FLOOR_Y; y += TILE) blit(SHEET.wallColumnMid, cx, y);
    blit(SHEET.wallColumnBase, cx, FLOOR_Y);
  }

  // Banners hang from just below the top cap
  blit(SHEET.bannerRed, Math.round(artW * 0.46 / TILE) * TILE, TILE);
  blit(SHEET.bannerGreen, Math.round(artW * 0.54 / TILE) * TILE, TILE);

  // Fountains are a 3-tile stack anchored to the floor line: spout, streaming
  // mid, and basin. The spout sits two rows above the floor so the mid tile
  // always has room (the stream + basin are animated in renderScene).
  for (const fx of scene.fountains) {
    blit(SHEET.fountainTop, fx, FLOOR_Y - 2 * TILE);
  }

  // Floor prop: a skull near the skeleton (the wizard's side stays clear —
  // the traced rune floats there)
  const feetY = FLOOR_Y + Math.round((SCENE_H - FLOOR_Y) * 0.66);
  blit(SHEET.skull, scene.skelet.x - 16, feetY - 12);
  ctx.drawImage(ASSETS.shadow, scene.skelet.x - 16 + 8 - 9, feetY - 2); // skull shadow

  // --- Atmosphere pass (baked): depth + vignette ---------------------------
  // Ambient occlusion: the wall casts a soft shadow onto the front of the floor.
  const ao = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + 12);
  ao.addColorStop(0, "rgba(8, 5, 12, 0.55)");
  ao.addColorStop(1, "rgba(8, 5, 12, 0)");
  ctx.fillStyle = ao;
  ctx.fillRect(0, FLOOR_Y, artW, 12);

  // Gentle global darken so the lava and rune read as actual light sources.
  ctx.fillStyle = "rgba(9, 6, 14, 0.16)";
  ctx.fillRect(0, 0, artW, SCENE_H);

  // Edge vignette: soft darkening on all four borders.
  const band = (grad, x, y, w, h) => { ctx.fillStyle = grad; ctx.fillRect(x, y, w, h); };
  const vt = ctx.createLinearGradient(0, 0, 0, 8);
  vt.addColorStop(0, "rgba(6, 4, 10, 0.7)"); vt.addColorStop(1, "rgba(6, 4, 10, 0)");
  band(vt, 0, 0, artW, 8);
  const vb = ctx.createLinearGradient(0, SCENE_H - 8, 0, SCENE_H);
  vb.addColorStop(0, "rgba(6, 4, 10, 0)"); vb.addColorStop(1, "rgba(6, 4, 10, 0.6)");
  band(vb, 0, SCENE_H - 8, artW, 8);
  const vl = ctx.createLinearGradient(0, 0, 16, 0);
  vl.addColorStop(0, "rgba(6, 4, 10, 0.55)"); vl.addColorStop(1, "rgba(6, 4, 10, 0)");
  band(vl, 0, 0, 16, SCENE_H);
  const vr = ctx.createLinearGradient(artW - 16, 0, artW, 0);
  vr.addColorStop(0, "rgba(6, 4, 10, 0)"); vr.addColorStop(1, "rgba(6, 4, 10, 0.55)");
  band(vr, artW - 16, 0, 16, SCENE_H);

  return cv;
}

function renderScene(now) {
  const cv = document.getElementById("scene");
  if (!cv) return;
  if (!scene || scene.cv !== cv) {
    if (!setupScene(cv)) return; // sheet still loading
  }
  const ctx = cv.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(scene.bg, 0, 0);

  const feetY = FLOOR_Y + Math.round((SCENE_H - FLOOR_Y) * 0.66);
  const fountainBasinY = FLOOR_Y;   // basin on the first floor row

  // Lava fountains: 3-frame animation, stream + basin. Drawn BEFORE the warm
  // light pools so the light washes over the fountain itself, not only the
  // tiles around it (otherwise the opaque basin sprite leaves a dark core).
  scene.fountains.forEach((fx, i) => {
    const fi = (Math.floor(now / 160) + i) % ASSETS.fountainMid.length;
    // Streaming mid tiles fill the gap between the spout and the basin.
    for (let y = FLOOR_Y - TILE; y > FLOOR_Y - 2 * TILE; y -= TILE) ctx.drawImage(ASSETS.fountainMid[fi], fx, y);
    ctx.drawImage(ASSETS.fountainBasin[fi], fx, fountainBasinY);
  });

  // Light pools (additive): each fountain spills warm light over itself and the
  // surrounding floor/wall, with a hot core right on the basin; the rune throws
  // cool light near the wizard. Gently flickering.
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  scene.fountains.forEach((fx, i) => {
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(now / 130 + i * 2.1);
    ctx.drawImage(ASSETS.poolWarm, fx + 8 - 34, fountainBasinY - 34);
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(now / 110 + i * 2.1);
    ctx.drawImage(ASSETS.glowFountain, fx + 8 - 15, fountainBasinY + 4 - 15);
  });
  ctx.globalAlpha = (0.6 + 0.25 * Math.sin(now / 300)) * (state.screen === "combat" ? 1 : 0.5);
  ctx.drawImage(ASSETS.poolCool, scene.rune.cx - 22, scene.rune.cy - 22);
  ctx.restore();

  // Grounding shadow under the wizard (the skeleton's is drawn with it below).
  ctx.drawImage(ASSETS.shadow, scene.wizard.x + SHEET.wizardIdle.w / 2 - 9, feetY - 2);

  // Fighters: the sheet's own 4-frame idle animations, out of phase
  const wf = Math.floor(now / 160) % ASSETS.wizard.length;
  const sf = Math.floor(now / 160 + 2) % ASSETS.skelet.length;
  // The staff is drawn BEHIND the wizard so the shaft is occluded by his body
  // and only the gem end pokes out. At rest it stands upright; while
  // tracing/casting the gem rides out to the rune disc, then jabs on launch.
  drawWizardStaff(ctx, now);

  ctx.drawImage(ASSETS.wizard[wf], scene.wizard.x, scene.wizard.y);

  // Skeleton: walks in from the right on a new wave, fades out on death
  let exOff = 0, eAlpha = 1;
  if (state.enemyPhase === "enter") {
    const p = Math.min(1, (now - state.enemyPhaseAt) / CONFIG.enemyEnterMs);
    const eased = 1 - Math.pow(1 - p, 3);
    exOff = Math.round((1 - eased) * (scene.artW + 24 - scene.skelet.x));
  } else if (state.enemyPhase === "dying") {
    const p = Math.min(1, (now - state.enemyPhaseAt) / CONFIG.enemyDeathMs);
    eAlpha = 1 - p;
    exOff = Math.round(p * 8);
    // dissolving embers rise as it collapses
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (let i = 0; i < 7; i++) {
      const h = (i * 97) % 13;
      const ex = scene.skelet.x + 3 + ((i * 5) % SHEET.skeletIdle.w);
      const ey = scene.skelet.y + SHEET.skeletIdle.h - Math.round(p * (10 + h));
      ctx.fillStyle = `rgba(77, 227, 224, ${(eAlpha * 0.8).toFixed(2)})`;
      ctx.fillRect(ex, ey, 1, 1);
    }
    ctx.restore();
  }
  ctx.save();
  ctx.globalAlpha = eAlpha;
  ctx.drawImage(ASSETS.shadowSm, scene.skelet.x + exOff + SHEET.skeletIdle.w / 2 - 8, feetY - 2);
  ctx.drawImage(ASSETS.skelet[sf], scene.skelet.x + exOff, scene.skelet.y);
  ctx.restore();

  // The wizard's spell-in-progress: the rune the player is tracing below is
  // mirrored as a tilted disc in front of the wizard. While tracing, it shows
  // node dots plus the chords drawn so far; on completion it flares with a
  // semi-transparent disc, then puffs away as the fireball launches from it.
  if (state.castAt) {
    const t = now - state.castAt;
    const charge = CONFIG.castChargeMs;
    const puff = CONFIG.runePuffMs;
    const flight = CONFIG.fireballFlightMs;
    const impact = CONFIG.fireballImpactMs;
    const f = CONFIG.colors.fireball;
    const chest = scene.skelChest;

    if (t < charge) {
      // charge: disc fades in behind the completed rune, lines go white-hot
      const q = t / charge;
      drawSceneRune(ctx, now, state.castChords, { disc: 0.14 + q * 0.26, bright: q, scale: 1 });
    } else if (t < charge + puff) {
      // puff: the rune expands and dissolves
      const q = (t - charge) / puff;
      drawSceneRune(ctx, now, state.castChords, {
        disc: 0.4 * (1 - q),
        bright: 1,
        scale: 1 + q * 0.7,
        alpha: 1 - q,
      });
    }

    if (t >= charge && t <= charge + flight) {
      const p = (t - charge) / flight;
      const x = Math.round(scene.rune.cx + (chest.x - scene.rune.cx) * p);
      const y = Math.round(scene.rune.cy + (chest.y - scene.rune.cy) * p - Math.sin(p * Math.PI) * 10);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.drawImage(ASSETS.glowFireball, x - 9, y - 9);
      ctx.restore();
      ctx.drawImage(ASSETS.fireball, x - 5, y - 3);
    } else if (t > charge + flight && t <= charge + flight + impact) {
      const q = (t - charge - flight) / impact;
      if (Math.floor((t - charge - flight) / 70) % 2 === 0) {
        ctx.drawImage(ASSETS.skeletHit[sf], scene.skelet.x, scene.skelet.y);
      }
      const r = Math.round(2 + q * 10);
      ctx.fillStyle = f.y;
      ctx.fillRect(chest.x - r, chest.y, 2, 1);
      ctx.fillRect(chest.x + r, chest.y, 2, 1);
      ctx.fillRect(chest.x, chest.y - r, 1, 2);
      ctx.fillRect(chest.x, chest.y + r, 1, 2);
      ctx.fillStyle = f.O;
      ctx.fillRect(chest.x - r + 1, chest.y - r + 1, 1, 1);
      ctx.fillRect(chest.x + r - 1, chest.y - r + 1, 1, 1);
      ctx.fillRect(chest.x - r + 1, chest.y + r - 1, 1, 1);
      ctx.fillRect(chest.x + r - 1, chest.y + r - 1, 1, 1);
    } else if (t > charge + flight + impact) {
      state.castAt = 0;
      state.castChords = null;
    }
  } else if (state.screen === "combat") {
    // tracing: live mirror of the chords drawn so far
    drawSceneRune(ctx, now, state.chords, { disc: 0, bright: 0, scale: 1 });
  }
}

// Crisp 1px Bresenham line (canvas stroke() would anti-alias)
function pixLine(ctx, x0, y0, x1, y1) {
  x0 = Math.round(x0); y0 = Math.round(y0); x1 = Math.round(x1); y1 = Math.round(y1);
  const dx = Math.abs(x1 - x0), dy = -Math.abs(y1 - y0);
  const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
  let err = dx + dy;
  for (;;) {
    ctx.fillRect(x0, y0, 1, 1);
    if (x0 === x1 && y0 === y1) break;
    const e2 = 2 * err;
    if (e2 >= dy) { err += dy; x0 += sx; }
    if (e2 <= dx) { err += dx; y0 += sy; }
  }
}

// Map a point on the bottom arena circle onto the scene's perspective disc
function runePoint(px, py, scale) {
  const { cx, cy, rx, ry } = scene.rune;
  const a = Math.atan2(py - CONFIG.circleCenter.y, px - CONFIG.circleCenter.x);
  return { x: cx + rx * scale * Math.cos(a), y: cy + ry * scale * Math.sin(a) };
}

// Map an *interior* arena point onto the disc proportionally (radius kept, not
// just angle) so a line being drawn across the circle mirrors faithfully on the
// disc. The normalized radius is clamped so a pointer flung past the rim stays
// on the staff's reach.
function runePointXY(px, py, scale = 1) {
  const { cx, cy, rx, ry } = scene.rune;
  let nx = (px - CONFIG.circleCenter.x) / CONFIG.circleRadius;
  let ny = (py - CONFIG.circleCenter.y) / CONFIG.circleRadius;
  const r = Math.hypot(nx, ny);
  if (r > 1.1) { nx = (nx / r) * 1.1; ny = (ny / r) * 1.1; }
  return { x: cx + nx * rx * scale, y: cy + ny * ry * scale };
}

// A 1px line with an additive glow: soft passes offset around the core line
function pixLineGlow(ctx, x0, y0, x1, y1, core, glowRGB) {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = `rgba(${glowRGB}, 0.16)`;
  for (const [ox, oy] of [[1, 0], [-1, 0], [0, 1], [0, -1], [1, 1], [-1, -1]]) {
    pixLine(ctx, x0 + ox, y0 + oy, x1 + ox, y1 + oy);
  }
  ctx.restore();
  ctx.fillStyle = core;
  pixLine(ctx, x0, y0, x1, y1);
}

function drawSceneRune(ctx, now, chords, { disc, bright, scale, alpha = 1 }) {
  const c = CONFIG.colors.sceneRune;
  const { cx, cy, rx, ry } = scene.rune;
  const slotAngle = (i) => -Math.PI / 2 + (i * 2 * Math.PI) / CONFIG.runeCount;
  const slotPt = (i) => ({
    x: Math.round(cx + rx * scale * Math.cos(slotAngle(i))),
    y: Math.round(cy + ry * scale * Math.sin(slotAngle(i))),
  });
  ctx.save();
  ctx.globalAlpha = alpha;

  // the disc hums: an ambient pulsing fill even while tracing, stronger
  // during the cast charge
  const discNow = Math.max(disc, 0.05 + 0.035 * Math.sin(now / 900));
  ctx.fillStyle = `rgba(${c.discRGB}, ${discNow.toFixed(3)})`;
  const RY = Math.round(ry * scale), RX = rx * scale;
  for (let dy = -RY; dy <= RY; dy++) {
    // sample at the row center so the ellipse's top/bottom don't flatten
    const s = (dy + (dy < 0 ? 0.5 : -0.5)) / (RY + 0.5);
    const hw = Math.round(RX * Math.sqrt(Math.max(0, 1 - s * s)));
    ctx.fillRect(Math.round(cx - hw), Math.round(cy + dy), hw * 2, 1);
  }

  // ghost web: every possible chord shimmers faintly, mirroring the
  // filigree pulse on the big circle below
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  let pairIdx = 0;
  for (let a = 0; a < CONFIG.runeCount; a++) {
    for (let b = a + 1; b < CONFIG.runeCount; b++) {
      const ga = 0.05 + 0.045 * Math.sin(now / 700 + pairIdx * 1.3);
      ctx.fillStyle = `rgba(${c.glowRGB}, ${Math.max(0, ga).toFixed(3)})`;
      const p1 = slotPt(a), p2 = slotPt(b);
      pixLine(ctx, p1.x, p1.y, p2.x, p2.y);
      pairIdx++;
    }
  }
  ctx.restore();

  // pulsing elliptical rings — the inner circle plus a fainter outer band
  // edge, hinting at the full wheel below
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const ringA = 0.2 + 0.08 * Math.sin(now / 900) + bright * 0.3;
  const steps = 44;
  for (const [mult, aMult] of [[1, 1], [1.3, 0.45]]) {
    ctx.fillStyle = `rgba(${c.glowRGB}, ${Math.max(0, ringA * aMult).toFixed(3)})`;
    for (let i = 0; i < steps; i++) {
      const a = (i * 2 * Math.PI) / steps;
      ctx.fillRect(
        Math.round(cx + rx * scale * mult * Math.cos(a)),
        Math.round(cy + ry * scale * mult * Math.sin(a)), 1, 1
      );
    }
  }
  ctx.restore();

  // glowing node dots at the six slot angles
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = `rgba(${c.glowRGB}, 0.35)`;
  for (let i = 0; i < CONFIG.runeCount; i++) {
    const p = slotPt(i);
    ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
  }
  ctx.restore();
  ctx.fillStyle = c.dot;
  for (let i = 0; i < CONFIG.runeCount; i++) {
    const p = slotPt(i);
    ctx.fillRect(p.x, p.y, 1, 1);
  }

  // the chords traced so far: burst white right after the match (mirroring
  // the filigree burst below), then hold lit with a midpoint tick
  if (chords) {
    for (const ch of chords) {
      const bursting = ch.addedAt && now - ch.addedAt < 320;
      const core = bursting || bright > 0.5 ? c.bright : c.line;
      const p1 = runePoint(ch.x1, ch.y1, scale);
      const p2 = runePoint(ch.x2, ch.y2, scale);
      pixLineGlow(ctx, Math.round(p1.x), Math.round(p1.y), Math.round(p2.x), Math.round(p2.y), core, c.glowRGB);
      // midpoint tick perpendicular to the chord — the sub-line hint
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const len = Math.hypot(p2.x - p1.x, p2.y - p1.y) || 1;
      const tx = -(p2.y - p1.y) / len, ty = (p2.x - p1.x) / len;
      ctx.fillStyle = core;
      pixLine(ctx, Math.round(mx - tx * 2), Math.round(my - ty * 2), Math.round(mx + tx * 2), Math.round(my + ty * 2));
    }
  }
  ctx.restore();
}

// Smoothed gem position, persisted between frames so the tip eases toward its
// target instead of snapping — this is what makes the trace read as deliberate.
let staffTip = null;

// Compose and draw the staff for the current frame. On standby it stands
// upright; while the player drags a pair the gem follows the forming line so
// the tip literally draws the stroke in the direction being dragged; during a
// cast it lifts into the rune disc, blazes, then jabs at the enemy on release.
function drawWizardStaff(ctx, now) {
  if (!scene) return;
  const spr = ASSETS && ASSETS.staff;
  if (!spr) return;
  const wiz = SHEET.wizardIdle;
  const sway = Math.sin(now / 620);
  // The staff rises from behind the wizard's right shoulder (it's drawn behind
  // him, so the shaft never covers his body). The grip slides along the shaft so
  // the gem reaches the target without the staff ever being resized.
  const shoulder = { x: scene.wizard.x + wiz.w - 5, y: scene.wizard.y + 11 };
  // standby: the gem stands above the hat, drifting with the sway
  const uprightTip = { x: shoulder.x + 3 + sway * 0.6, y: shoulder.y - 20 };

  let target = uprightTip, glow = 0, thrust = 0, smooth = 0.25, formA = null;

  if (state.castAt) {
    const t = now - state.castAt;
    const charge = CONFIG.castChargeMs, puff = CONFIG.runePuffMs;
    const discTop = { x: scene.rune.cx, y: scene.rune.cy - 4 };
    if (t < charge) {                       // charge: lift into the disc, wind up
      target = discTop; glow = 0.55 + 0.45 * (t / charge); smooth = 0.4;
    } else if (t < charge + puff) {         // release: jab toward the enemy
      const q = (t - charge) / puff;
      target = discTop; glow = 1 - q * 0.4; thrust = Math.sin(q * Math.PI); smooth = 0.6;
    } else {                                // recover: settle, gem fades
      target = discTop; glow = Math.max(0, 1 - (t - charge - puff) / 220); smooth = 0.45;
    }
  } else if (
    state.screen === "combat" && state.dragActive &&
    state.selectedRuneId !== null && state.dragPointer
  ) {
    // active trace: the tip rides the drawn line from the held rune toward the
    // pointer, so it traces the exact stroke in the direction the player draws
    const anchor = state.runes.find((r) => r.id === state.selectedRuneId);
    if (anchor) {
      formA = runePointXY(anchor.x, anchor.y);
      target = runePointXY(state.dragPointer.x, state.dragPointer.y);
      const drawn = Math.hypot(target.x - formA.x, target.y - formA.y);
      glow = 0.35 + Math.min(0.55, (drawn / 13) * 0.55);
      smooth = 0.2; // eased, so the tip trails the pointer for a deliberate trace
    }
  }
  // else: standby / menus — staff stays upright with a dark gem

  // lunge slides the gem toward the enemy on cast release
  if (thrust) target = { x: target.x + thrust * 7, y: target.y + thrust * 1 };

  if (!staffTip) staffTip = { x: uprightTip.x, y: uprightTip.y };
  staffTip.x += (target.x - staffTip.x) * smooth;
  staffTip.y += (target.y - staffTip.y) * smooth;
  const gemx = staffTip.x, gemy = staffTip.y; // the gem sits exactly on the target

  // Fixed-size staff: the wizard grips it GRIP of the way down from the gem end,
  // and the grip (his hand) slides to wherever puts the gem on the target.
  const GRIP = 0.68;
  const S = 0.7;                                 // never varies — no resizing
  const upper = GRIP * spr.height * S;           // gem → grip, constant
  const ang = Math.atan2(gemy - shoulder.y, gemx - shoulder.x); // aim: shoulder → gem
  const gripx = gemx - Math.cos(ang) * upper;    // hand slides back along the aim
  const gripy = gemy - Math.sin(ang) * upper;

  // the stroke being drawn runs from the anchor node to the gem
  if (formA) {
    const c = CONFIG.colors.sceneRune;
    pixLineGlow(ctx, Math.round(formA.x), Math.round(formA.y), Math.round(gemx), Math.round(gemy), c.line, c.glowRGB);
  }

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.translate(gripx, gripy);                   // pivot at the grip, which moves freely
  ctx.rotate(ang + Math.PI / 2);                 // sprite points up (-y); swing its gem onto the aim
  ctx.scale(S, S);
  ctx.drawImage(spr, -Math.round(spr.width / 2), -Math.round(GRIP * spr.height));
  ctx.restore();
  // the gem blazes with an additive teal halo while tracing/casting
  drawGemGlow(ctx, now, Math.round(gemx), Math.round(gemy), glow);
}

// An additive teal halo on the staff's gem at (tx,ty); strength tracks `glow`
// in [0,1], with a flicked spark while it blazes. The gem body itself comes
// from the sprite — this only lights it up.
function drawGemGlow(ctx, now, tx, ty, glow) {
  if (glow <= 0.05) return;
  const rgb = CONFIG.colors.staff.glowRGB;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  const halo = 0.18 + 0.55 * glow;
  for (const [ox, oy, a] of [[0, 0, 1], [1, 0, 0.6], [-1, 0, 0.6], [0, 1, 0.6], [0, -1, 0.6],
                             [2, 0, 0.3], [-2, 0, 0.3], [0, 2, 0.3], [0, -2, 0.3]]) {
    ctx.fillStyle = `rgba(${rgb}, ${(halo * a).toFixed(3)})`;
    ctx.fillRect(tx + ox, ty + oy, 1, 1);
  }
  if (glow > 0.6) {
    const sp = (Math.floor(now / 90) * 2654435761) >>> 0;
    const ax = (sp % 5) - 2, ay = ((sp >> 3) % 5) - 2;
    ctx.fillStyle = `rgba(${rgb}, ${(0.5 * glow).toFixed(3)})`;
    ctx.fillRect(tx + ax, ty + ay, 1, 1);
  }
  ctx.restore();
}

// ---------------------------------------------------------------------------
// Word pool / circle population
// ---------------------------------------------------------------------------
function drawLoadout() {
  const pairs = [];
  for (let i = 0; i < CONFIG.pairsPerLoadout; i++) {
    const idx = (state.poolIndex + i) % WORD_POOL.length;
    pairs.push({ id: idx, it: WORD_POOL[idx].it, de: WORD_POOL[idx].de });
  }
  state.poolIndex = (state.poolIndex + CONFIG.pairsPerLoadout) % WORD_POOL.length;
  return pairs;
}

function populateCircle(pairs) {
  const slots = layoutCircle(CONFIG.runeCount);
  const contents = [];
  pairs.forEach((p) => {
    contents.push({ pairId: p.id, lang: "it", word: p.it });
    contents.push({ pairId: p.id, lang: "de", word: p.de });
  });
  shuffleArray(contents);

  state.runes = contents.map((c, i) => ({
    id: i,
    pairId: c.pairId,
    lang: c.lang,
    word: c.word,
    x: slots[i].x,
    y: slots[i].y,
    matchState: "unmatched",
  }));
  state.chords = [];
  state.selectedRuneId = null;
  state.currentPairs = pairs;
  pairs.forEach((p) => {
    state.pairAvailableAtClockMs[p.id] = state.clockMs;
  });
  state._structuralDirty = true;
}


// ---------------------------------------------------------------------------
// Combat logic
// ---------------------------------------------------------------------------
function handleRuneClick(id) {
  if (state.screen !== "combat") return;
  const rune = state.runes.find((r) => r.id === id);
  if (!rune) return;
  if (rune.matchState === "matched") return; // DECISION: clicking a matched rune is a no-op

  if (state.selectedRuneId === id) {
    rune.matchState = "unmatched";
    state.selectedRuneId = null;
    state._structuralDirty = true;
    return;
  }

  if (state.selectedRuneId === null) {
    rune.matchState = "selected";
    state.selectedRuneId = id;
    state._structuralDirty = true;
    return;
  }

  const first = state.runes.find((r) => r.id === state.selectedRuneId);
  const correct = first.pairId === rune.pairId;
  const now = performance.now();
  const availableAt = state.pairAvailableAtClockMs[first.pairId] ?? state.clockMs;
  const secondsAvailable = ((state.clockMs - availableAt) / 1000).toFixed(1);
  logAttempt(correct, first, rune, secondsAvailable);
  state._structuralDirty = true;

  if (correct) {
    first.matchState = "matched";
    rune.matchState = "matched";
    state.chords.push({
      x1: first.x, y1: first.y, x2: rune.x, y2: rune.y,
      pairId: rune.pairId,
      slotA: Math.min(first.id, rune.id),
      slotB: Math.max(first.id, rune.id),
      addedAt: now, // drives the burst flash on the filigree and the mirror
    });
    state.selectedRuneId = null;
    if (state.chords.length >= CONFIG.pairsPerLoadout) {
      onShapeComplete(now);
    }
  } else {
    state.wrongMatchCount++;
    first.matchState = "unmatched";
    state.selectedRuneId = null;
    state.wrongFlashUntil = now + CONFIG.wrongFlashDurationMs;
    hitPlayer(Math.max(1, Math.round(state.enemyDmg * CONFIG.wrongMatchDmgFactor)));
  }
}

function onShapeComplete(now) {
  // The three completed chords lighting up together *is* the cast. Fire the
  // spell animation, then resolve damage — unless the enemy is already dying.
  state.shapeFlashUntil = now + CONFIG.shapeFlashDurationMs;
  state.castAt = now;
  state.castChords = state.chords.map((c) => ({ ...c })); // survives the refill

  if (state.enemyPhase === "dying") return; // spell already landed the kill

  // The spell hits the skeleton (no gold in combat — currency is quiz-only)
  hitEnemy(state.heroDmg);

  if (state.enemyHP <= 0) {
    // lethal: end the wave once the cast animation finishes (see rafLoop)
    state.pendingWaveEnd = true;
  } else {
    if (CONFIG.staggerOnCast) state.windup = 0;
    state.pendingRefill = true;
  }
}

function hitPlayer(n) {
  state.heroHP = Math.max(0, state.heroHP - n);
  if (state.heroHP <= 0 && state.screen === "combat") {
    state.lastWaveReached = state.wave;
    state.screen = "defeat";
  }
}

function hitEnemy(n) {
  state.enemyHP = Math.max(0, state.enemyHP - n);
}

// ---------------------------------------------------------------------------
// Post-death vocab quiz — the only source of currency
// ---------------------------------------------------------------------------
function buildQuiz() {
  // pick N distinct pairs; each question is it -> en with distractor options
  const pool = shuffleArray(WORD_POOL.map((p, i) => ({ ...p, i })));
  const n = Math.min(CONFIG.quizQuestionCount, pool.length);
  state.quizList = pool.slice(0, n).map((pair) => {
    const distractors = shuffleArray(WORD_POOL.filter((p) => p.de !== pair.de))
      .slice(0, CONFIG.quizOptionCount - 1)
      .map((p) => p.de);
    const options = shuffleArray([pair.de, ...distractors]);
    return { it: pair.it, de: pair.de, options };
  });
  state.quizIndex = 0;
  state.quizCorrect = 0;
  state.quizGoldEarned = 0;
  state.quizPicked = null;
}
function goToQuiz() {
  buildQuiz();
  state.screen = "quiz";
  state._structuralDirty = true;
}
function answerQuiz(optIndex) {
  if (state.quizPicked !== null) return; // already answered this question
  const q = state.quizList[state.quizIndex];
  const correct = q.options[optIndex] === q.de;
  state.quizPicked = optIndex;
  if (correct) {
    state.quizCorrect++;
    const reward = CONFIG.goldPerCorrect + CONFIG.quizWaveBonus * (state.lastWaveReached - 1);
    state.gold += reward;
    state.quizGoldEarned += reward;
    saveProgress();
  }
  state.quizAnsweredAt = performance.now();
  state._structuralDirty = true;
}
function advanceQuiz() {
  state.quizPicked = null;
  state.quizIndex++;
  if (state.quizIndex >= state.quizList.length) {
    state.screen = "upgrade";
  }
  state._structuralDirty = true;
}

// Upgrade shop: spend quiz gold on permanent hero DMG or max HP
function buyDmg() {
  const cost = dmgUpgradeCost();
  if (state.gold < cost) return;
  state.gold -= cost;
  state.dmgLevel++;
  state.heroDmg = CONFIG.heroBaseDmg + state.dmgLevel * CONFIG.dmgPerLevel;
  saveProgress();
  state._structuralDirty = true;
}
function buyHp() {
  const cost = hpUpgradeCost();
  if (state.gold < cost) return;
  state.gold -= cost;
  state.hpLevel++;
  state.heroMaxHP += CONFIG.hpPerLevel;
  saveProgress();
  state._structuralDirty = true;
}

function logAttempt(correct, first, second, secondsAvailable) {
  console.log(
    `[${new Date().toISOString()}] mode=${state.mode} pair="${first.word} / ${second.word}" ` +
    `result=${correct ? "correct" : "wrong"} availableFor=${secondsAvailable}s`
  );
}

function cycleMode() {
  const idx = (MODE_ORDER.indexOf(state.mode) + 1) % MODE_ORDER.length;
  state.mode = MODE_ORDER[idx];
}

function restart() {
  // Hard reset: wipes meta-progression (including the saved game) and starts a
  // fresh run from the base build
  clearProgress();
  newGame();
  startRun();
}

// ---------------------------------------------------------------------------
// Game loop — the only place mode/selection-dependent timing branches exist.
// ---------------------------------------------------------------------------
function getEffectiveDt(rawDt) {
  if (state.selectedRuneId === null) return rawDt; // idle time always runs at full speed, in all 3 modes
  switch (state.mode) {
    case "REAL_TIME": return rawDt;
    case "SLOW_MO": return rawDt * CONFIG.slowMoFactor;
    case "FREEZE": return 0;
    default: return rawDt;
  }
}

let lastRafNow = null;
function rafLoop(now) {
  if (lastRafNow === null) lastRafNow = now;
  const rawDt = now - lastRafNow;
  lastRafNow = now;

  if (state.screen === "combat") {
    const effectiveDt = getEffectiveDt(rawDt);
    state.clockMs += effectiveDt;
    // The skeleton only winds up its attack once it has fully entered and is
    // still alive — not while walking in or dying.
    if (state.enemyPhase === "alive") {
      state.windup += effectiveDt / CONFIG.windupDurationMs;
      if (state.windup >= 1) {
        state.windup = 0;
        hitPlayer(state.enemyDmg);
      }
    }
    // Enemy finished walking in → it's now active
    if (state.enemyPhase === "enter" && now - state.enemyPhaseAt >= CONFIG.enemyEnterMs) {
      state.enemyPhase = "alive";
    }
    // A lethal cast has finished animating → play the skeleton's death
    if (state.pendingWaveEnd && state.castAt === 0 && state.enemyPhase !== "dying") {
      state.pendingWaveEnd = false;
      state.enemyPhase = "dying";
      state.enemyPhaseAt = now;
    }
    // Death animation done → the next, stronger skeleton walks in. The build
    // stays fixed for the whole run; upgrades only happen between runs.
    if (state.enemyPhase === "dying" && now - state.enemyPhaseAt >= CONFIG.enemyDeathMs) {
      startWave(state.wave + 1);
    }
    if (state.pendingRefill && state.screen === "combat" && now >= state.shapeFlashUntil) {
      state.pendingRefill = false;
      populateCircle(drawLoadout());
    }
  }

  // Quiz: advance to the next question a beat after the player answers
  if (state.screen === "quiz" && state.quizPicked !== null &&
      now - state.quizAnsweredAt >= CONFIG.quizFeedbackMs) {
    advanceQuiz();
  }

  render(now);
  requestAnimationFrame(rafLoop);
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
// DECISION: the DOM is only rebuilt on actual state changes (screen switch,
// rune/chord structure change). Continuous per-frame animation (windup bar,
// flash timers, HUD text) is patched directly on existing nodes instead of
// replacing the whole tree every rAF tick — rebuilding ~60x/sec would tear
// down interactive elements (e.g. the Fight button) out from under real
// clicks, since a click can land in the gap between two rebuilds.
const app = document.getElementById("app");
let builtScreen = null;

function render(now) {
  if (state.screen === "combat") {
    if (builtScreen !== "combat" || state._structuralDirty) {
      renderCombatFull();
      builtScreen = "combat";
      state._structuralDirty = false;
    }
    patchCombatContinuous(now);
  } else if (state.screen === "quiz") {
    if (builtScreen !== "quiz" || state._structuralDirty) {
      renderQuizFull();
      builtScreen = "quiz";
      state._structuralDirty = false;
    }
  } else if (state.screen === "upgrade") {
    if (builtScreen !== "upgrade" || state._structuralDirty) {
      renderUpgradeFull();
      builtScreen = "upgrade";
      state._structuralDirty = false;
    }
  } else {
    if (builtScreen !== state.screen) {
      renderEndFull();
      builtScreen = state.screen;
    }
  }
}

// The post-death vocab quiz — answer to earn gold for upgrades
function renderQuizFull() {
  const q = state.quizList[state.quizIndex];
  const answered = state.quizPicked !== null;
  const optsHtml = q.options
    .map((opt, i) => {
      let cls = "quiz-opt";
      if (answered) {
        if (opt === q.de) cls += " correct";
        else if (i === state.quizPicked) cls += " wrong";
        else cls += " faded";
      }
      return `<button class="${cls}" onclick="answerQuiz(${i})">${opt}</button>`;
    })
    .join("");
  app.innerHTML = `
    <div class="screen quiz-screen">
      <div class="quiz-progress">Question ${state.quizIndex + 1} / ${state.quizList.length}
        &middot; <span class="coin">◈</span> ${state.quizGoldEarned} earned</div>
      <h1>Study the runes</h1>
      <p class="quiz-prompt">What does <span class="quiz-word">${q.it}</span> mean?</p>
      <div class="quiz-opts">${optsHtml}</div>
    </div>`;
}

// Upgrade shop — spend quiz gold on permanent build upgrades, then run again
function renderUpgradeFull() {
  const dmgCost = dmgUpgradeCost();
  const hpCost = hpUpgradeCost();
  const canDmg = state.gold >= dmgCost;
  const canHp = state.gold >= hpCost;
  app.innerHTML = `
    <div class="screen upgrade-screen">
      <h1>Your Arsenal</h1>
      <p class="gold-big"><span class="coin">◈</span> ${state.gold} gold</p>
      <div class="upg-cards">
        <button class="upg-card ${canDmg ? "" : "poor"}" onclick="buyDmg()">
          <div class="upg-name">⚔ Attack</div>
          <div class="upg-stat">${state.heroDmg} → ${state.heroDmg + CONFIG.dmgPerLevel} dmg</div>
          <div class="upg-cost"><span class="coin">◈</span> ${dmgCost}</div>
        </button>
        <button class="upg-card ${canHp ? "" : "poor"}" onclick="buyHp()">
          <div class="upg-name">✚ Vitality</div>
          <div class="upg-stat">${state.heroMaxHP} → ${state.heroMaxHP + CONFIG.hpPerLevel} max HP</div>
          <div class="upg-cost"><span class="coin">◈</span> ${hpCost}</div>
        </button>
      </div>
      <p class="upg-hp">Build: ${state.heroMaxHP} HP · ${state.heroDmg} DMG</p>
      <button class="fight-btn next-wave-btn" onclick="startRun()">Begin Run →</button>
    </div>`;
}

// Small runic-looking polyline glyphs, procedurally placed so no font
// support is required. Templates are in local coords (y up = outward).
const GLYPH_TEMPLATES = [
  [[0, -5], [0, 5]],
  [[-3, 5], [0, -5], [3, 5]],
  [[-3, -5], [-3, 5], [3, 5]],
  [[-3, 5], [-3, -5], [3, -5], [3, 5]],
  [[-3, -5], [3, 5], [3, -5]],
  [[0, -5], [0, 5], [3, 0], [-3, 0]],
  [[-3, 0], [0, -5], [3, 0], [0, 5], [-3, 0]],
  [[3, -5], [-3, -1], [3, 3], [0, 5]],
];

function glyphAt(cx, cy, r, angleDeg, size, seed, cls) {
  const t = GLYPH_TEMPLATES[tileHash(seed, 31) % GLYPH_TEMPLATES.length];
  const gx = cx + r * Math.cos((angleDeg * Math.PI) / 180);
  const gy = cy + r * Math.sin((angleDeg * Math.PI) / 180);
  const pts = t.map(([x, y]) => `${(x * size / 5).toFixed(1)},${(y * size / 5).toFixed(1)}`).join(" ");
  return `<polyline class="${cls}" points="${pts}" transform="translate(${gx.toFixed(1)} ${gy.toFixed(1)}) rotate(${(angleDeg + 90).toFixed(1)})"/>`;
}

function renderCombatFull() {
  const { x: cx, y: cy } = CONFIG.circleCenter;
  const slots = layoutCircle(CONFIG.runeCount);

  // The static wheel art is baked into assets/arcane_wheel.png (generated
  // from this exact geometry). Live SVG adds only the dynamic layers.
  const bandInner = CONFIG.circleRadius - 52;
  const bandOuter = CONFIG.circleRadius + 52;

  // Rotating inner script ring beneath the chords (rings are baked; only the
  // rotating glyphs stay live)
  const inner = [];
  for (let i = 0; i < 24; i++) {
    inner.push(glyphAt(cx, cy, 100, i * 15, 7, 100 + i, "glyph"));
  }
  const innerHtml = `<g class="inner-band" id="inner-band" opacity="0.30">${inner.join("")}</g>`;

  // Ember sparks scattered around the band, twinkling per frame
  const sparks = [];
  for (let i = 0; i < 60; i++) {
    const h = tileHash(i, 997);
    const a = (h % 3600) / 10;
    const r = bandInner - 6 + (tileHash(i, 499) % (bandOuter - bandInner + 12));
    const sx = cx + r * Math.cos((a * Math.PI) / 180);
    const sy = cy + r * Math.sin((a * Math.PI) / 180);
    const sr = 1.5 + (h % 3);
    sparks.push(`<circle class="spark" cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${sr}" data-phase="${((h % 628) / 100).toFixed(2)}" style="opacity:0"/>`);
  }
  const sparksHtml = sparks.join("");

  // Filigree: for each of the 15 possible chords, an artistic group of
  // sub-lines (ghost line, perpendicular ticks, midpoint diamond, end barbs).
  // They pulse with the background hum; a correct match bursts its group
  // white, then it stays lit alongside the drawn main chord.
  const filigree = [];
  for (let a = 0; a < CONFIG.runeCount; a++) {
    for (let b = a + 1; b < CONFIG.runeCount; b++) {
      const p1 = slots[a], p2 = slots[b];
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.hypot(dx, dy);
      const ux = dx / len, uy = dy / len;   // along the chord
      const nx = -uy, ny = ux;              // perpendicular
      const at = (t) => ({ x: p1.x + dx * t, y: p1.y + dy * t });
      const seg = (x1, y1, x2, y2, w) =>
        `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke-width="${w}"/>`;
      const parts = [];
      // ghost of the main line
      parts.push(`<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke-width="1" stroke-dasharray="2 7"/>`);
      // perpendicular ticks
      for (const t of [0.35, 0.65]) {
        const p = at(t);
        parts.push(seg(p.x - nx * 7, p.y - ny * 7, p.x + nx * 7, p.y + ny * 7, 1.2));
      }
      // midpoint diamond
      const m = at(0.5);
      parts.push(
        `<polygon points="${(m.x + ux * 6).toFixed(1)},${(m.y + uy * 6).toFixed(1)} ${(m.x + nx * 6).toFixed(1)},${(m.y + ny * 6).toFixed(1)} ${(m.x - ux * 6).toFixed(1)},${(m.y - uy * 6).toFixed(1)} ${(m.x - nx * 6).toFixed(1)},${(m.y - ny * 6).toFixed(1)}" stroke-width="1.2"/>`
      );
      // barbs angled back near each endpoint
      for (const [t, dir] of [[0.14, 1], [0.86, -1]]) {
        const p = at(t);
        parts.push(seg(p.x, p.y, p.x + (nx * 9 - ux * 6 * dir), p.y + (ny * 9 - uy * 6 * dir), 1.2));
        parts.push(seg(p.x, p.y, p.x - (nx * 9 + ux * 6 * dir), p.y - (ny * 9 + uy * 6 * dir), 1.2));
      }
      filigree.push(`<g class="sub-group" data-key="${a}-${b}">${parts.join("")}</g>`);
    }
  }
  const filigreeHtml = filigree.join("");

  const chordsHtml = state.chords
    .map(
      (c) =>
        `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" class="chord-glow" />` +
        `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" class="chord" />`
    )
    .join("");

  const runesHtml = state.runes
    .map(
      (r) => `
    <g class="rune ${r.matchState}" data-id="${r.id}">
      <circle class="halo" cx="${r.x}" cy="${r.y}" r="${CONFIG.runeRadius + 7}" filter="url(#glow)"></circle>
      <circle class="body" cx="${r.x}" cy="${r.y}" r="${CONFIG.runeRadius}"></circle>
      <text x="${r.x}" y="${r.y}">${r.word}</text>
    </g>`
    )
    .join("");

  // Live line that follows the pointer while dragging a rune toward its pair.
  const dragLineHtml = `<line id="drag-line" class="drag-line" x1="0" y1="0" x2="0" y2="0"></line>`;

  const arenaDefs = `
    <defs>
      <radialGradient id="bgGlow">
        <stop offset="0%" stop-color="rgba(77,227,224,0.15)"/>
        <stop offset="60%" stop-color="rgba(77,227,224,0.06)"/>
        <stop offset="100%" stop-color="rgba(77,227,224,0)"/>
      </radialGradient>
      <radialGradient id="sparkGrad">
        <stop offset="0%" stop-color="rgba(234,255,254,0.95)"/>
        <stop offset="35%" stop-color="rgba(77,227,224,0.6)"/>
        <stop offset="100%" stop-color="rgba(77,227,224,0)"/>
      </radialGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
      <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="2.5"/>
      </filter>
      <filter id="wideGlow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="9"/>
      </filter>
    </defs>
    <image id="wheel-img" href="assets/arcane_wheel.png" x="0" y="0" width="600" height="600"/>
    <circle id="bg-glow" cx="${cx}" cy="${cy}" r="${CONFIG.circleRadius + 60}" fill="url(#bgGlow)"/>
    ${innerHtml}
    ${sparksHtml}
    ${filigreeHtml}`;

  app.innerHTML = `
    <div class="screen combat-screen" id="combat-root">
      <div class="scene-wrap"><canvas class="scene" id="scene"></canvas></div>
      <div class="hud-under">
        <div class="hero-hud">
          <div class="bar-label">HERO <span id="hero-hp-text"></span></div>
          <div class="hp-track hero"><div class="hp-fill" id="hero-hp-fill"></div></div>
          <div class="bar-sub">⚔ ${state.heroDmg} DMG</div>
        </div>
        <div class="enemy-hud">
          <div class="bar-label" id="wave-label"></div>
          <div class="hp-track enemy"><div class="hp-fill" id="enemy-hp-fill"></div></div>
          <div class="windup-track" id="windup-track"><div class="windup-fill" id="windup-fill"></div></div>
          <div class="time-chip" id="time-chip"></div>
        </div>
      </div>
      <div class="time-veil" id="time-veil"></div>
      <div class="combat-mode-row">
        <button class="mode-btn" id="mode-label" onclick="cycleMode()"></button>
      </div>
      <svg class="arena" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet">
        ${arenaDefs}
        ${chordsHtml}
        ${dragLineHtml}
        ${runesHtml}
      </svg>
    </div>`;
}

function patchCombatContinuous(now) {
  const root = document.getElementById("combat-root");
  if (!root) return;

  root.classList.toggle("wrong-flash", now < state.wrongFlashUntil);
  document.getElementById("mode-label").textContent = `MODE: ${MODE_LABELS[state.mode]} — tap to change`;
  document.getElementById("hero-hp-text").textContent = `${Math.ceil(state.heroHP)} / ${state.heroMaxHP}`;
  document.getElementById("hero-hp-fill").style.width = (100 * state.heroHP / state.heroMaxHP).toFixed(1) + "%";
  document.getElementById("wave-label").innerHTML = `WAVE ${state.wave} · SKELETON <span>${Math.ceil(state.enemyHP)} / ${state.enemyMaxHP}</span>`;
  document.getElementById("enemy-hp-fill").style.width = (100 * state.enemyHP / state.enemyMaxHP).toFixed(1) + "%";

  const windupPct = Math.max(0, Math.min(1, state.windup));
  const fillEl = document.getElementById("windup-fill");
  if (fillEl) fillEl.style.width = (windupPct * 100).toFixed(2) + "%";

  // Time-warp feedback: while a rune is selected, show what time is doing.
  const selected = state.selectedRuneId !== null;
  const veil = document.getElementById("time-veil");
  const chip = document.getElementById("time-chip");
  const track = document.getElementById("windup-track");
  let veilClass = "time-veil";
  let chipClass = "time-chip";
  let chipText = "";
  let trackClass = "windup-track";
  if (selected) {
    if (state.mode === "SLOW_MO") {
      veilClass += " slowmo"; chipClass += " warped"; trackClass += " warp-slow";
      chipText = `TIME ×${CONFIG.slowMoFactor}`;
    } else if (state.mode === "FREEZE") {
      veilClass += " freeze"; chipClass += " warped"; trackClass += " warp-freeze";
      chipText = "TIME FROZEN";
    } else {
      chipClass += " rt";
      chipText = "TIME ×1 — STILL WINDING UP!";
    }
  } else if (state.mode === "SLOW_MO") {
    chipClass += " idle";
    chipText = "hold a rune to slow time";
  } else if (state.mode === "FREEZE") {
    chipClass += " idle";
    chipText = "hold a rune to freeze time";
  }
  veil.className = veilClass;
  chip.className = chipClass;
  chip.textContent = chipText;
  track.className = trackClass;

  renderScene(now);

  const shapeFlashActive = now < state.shapeFlashUntil;
  document.querySelectorAll(".chord, .chord-glow").forEach((el) => el.classList.toggle("flash", shapeFlashActive));

  // Drag-to-connect: while a rune is held, draw a line from it to the pointer.
  const dragLine = document.getElementById("drag-line");
  if (dragLine) {
    const anchor = state.dragActive && state.selectedRuneId !== null
      ? state.runes.find((r) => r.id === state.selectedRuneId)
      : null;
    if (anchor && state.dragPointer) {
      dragLine.setAttribute("x1", anchor.x);
      dragLine.setAttribute("y1", anchor.y);
      dragLine.setAttribute("x2", state.dragPointer.x.toFixed(1));
      dragLine.setAttribute("y2", state.dragPointer.y.toFixed(1));
      dragLine.classList.add("active");
    } else {
      dragLine.classList.remove("active");
    }
  }

  // Background hum: the cyan glow behind the circle breathes slowly, and the
  // band's glow layers breathe with it
  const hum = 0.72 + 0.28 * Math.sin(now / 900);
  const bgGlowEl = document.getElementById("bg-glow");
  if (bgGlowEl) bgGlowEl.style.opacity = hum.toFixed(3);
  const wheelImg = document.getElementById("wheel-img");
  if (wheelImg) wheelImg.style.opacity = (0.86 + 0.14 * Math.sin(now / 900)).toFixed(3);

  // Inner script ring rotates slowly; ember sparks twinkle at their own phase
  const innerBand = document.getElementById("inner-band");
  if (innerBand) {
    innerBand.setAttribute(
      "transform",
      `rotate(${((now / 260) % 360).toFixed(2)} ${CONFIG.circleCenter.x} ${CONFIG.circleCenter.y})`
    );
  }
  document.querySelectorAll(".spark").forEach((el) => {
    const p = parseFloat(el.dataset.phase);
    const tw = Math.max(0, Math.sin(now / 420 + p * 2.4));
    el.style.opacity = (tw * tw * 0.95).toFixed(3);
  });

  // Filigree: lit groups follow their matched chord (burst first, then hold);
  // unlit groups shimmer with the background pulse
  const chordByKey = {};
  for (const c of state.chords) chordByKey[`${c.slotA}-${c.slotB}`] = c;
  document.querySelectorAll(".sub-group").forEach((el, idx) => {
    const chord = chordByKey[el.dataset.key];
    if (chord) {
      const burst = now - chord.addedAt < 320;
      el.classList.toggle("burst", burst);
      el.style.opacity = burst ? "1" : "0.8";
    } else {
      el.classList.remove("burst");
      el.style.opacity = (0.06 + 0.05 * Math.sin(now / 700 + idx * 1.3)).toFixed(3);
    }
  });
}

function renderEndFull() {
  const elapsed = ((performance.now() - state.runStartMs) / 1000).toFixed(0);
  app.innerHTML = `
    <div class="screen end-screen">
      <h1 class="defeat">Defeat</h1>
      <p>The horde overwhelmed you on <strong>Wave ${state.lastWaveReached}</strong></p>
      <p class="dim">${elapsed}s survived &middot; ${state.wrongMatchCount} mismatches</p>
      <p class="end-flavor">Study your vocabulary to grow stronger for the next run.</p>
      <button class="fight-btn study-btn" onclick="goToQuiz()">Study &amp; Earn Gold →</button>
    </div>`;
}

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------

// Rune input — the primary gesture is drag-to-connect: press a rune, drag the
// glowing thread onto its pair, release to attempt the match. Tapping still
// arms a rune, so the older two-tap flow keeps working as a fallback. Handlers
// are delegated off document/window so they survive the SVG being rebuilt.
const DRAG_MOVE_THRESHOLD = 6; // px of pointer travel before a press counts as a drag
let dragStartClient = null;

function clientToArena(clientX, clientY) {
  const svg = document.querySelector("svg.arena");
  const ctm = svg && svg.getScreenCTM ? svg.getScreenCTM() : null;
  if (!ctm) return null;
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const p = pt.matrixTransform(ctm.inverse());
  return { x: p.x, y: p.y };
}

function runeIdAtPoint(clientX, clientY) {
  const el = document.elementFromPoint(clientX, clientY);
  const g = el && el.closest ? el.closest(".rune") : null;
  if (!g || g.dataset.id === undefined) return null;
  return Number(g.dataset.id);
}

function onRunePointerDown(e) {
  if (state.screen !== "combat") return;
  if (e.pointerType === "mouse" && e.button !== 0) return;
  const id = runeIdAtPoint(e.clientX, e.clientY);
  if (id === null) return;
  const rune = state.runes.find((r) => r.id === id);
  if (!rune || rune.matchState === "matched") return;

  e.preventDefault();

  // A different rune is already armed → this press is the second selection;
  // resolve the match immediately (classic two-tap) without starting a drag.
  if (state.selectedRuneId !== null && state.selectedRuneId !== id) {
    handleRuneClick(id);
    return;
  }

  // Otherwise begin dragging from this rune, arming it first if needed.
  if (state.selectedRuneId === null) handleRuneClick(id);
  state.dragActive = true;
  state.dragMoved = false;
  state.dragPointer = { x: rune.x, y: rune.y };
  dragStartClient = { x: e.clientX, y: e.clientY };
  const svg = document.querySelector("svg.arena");
  if (svg && svg.setPointerCapture) { try { svg.setPointerCapture(e.pointerId); } catch (_) {} }
}

function onRunePointerMove(e) {
  if (!state.dragActive) return;
  if (dragStartClient) {
    const dx = e.clientX - dragStartClient.x;
    const dy = e.clientY - dragStartClient.y;
    if (dx * dx + dy * dy > DRAG_MOVE_THRESHOLD * DRAG_MOVE_THRESHOLD) state.dragMoved = true;
  }
  const p = clientToArena(e.clientX, e.clientY);
  if (p) state.dragPointer = p;
}

function onRunePointerUp(e) {
  if (!state.dragActive) return;
  state.dragActive = false;
  state.dragPointer = null;
  const from = state.selectedRuneId;
  if (from === null) return;

  const target = runeIdAtPoint(e.clientX, e.clientY);
  if (target !== null && target !== from) {
    handleRuneClick(target);            // resolve the match against the armed rune
  } else if (state.dragMoved) {
    handleRuneClick(from);              // dragged off and released → cancel the arm
  }
  // A tap with no real movement leaves the rune armed so a second tap can match.
}

function onRunePointerCancel() {
  if (!state.dragActive) return;
  state.dragActive = false;
  state.dragPointer = null;
  if (state.dragMoved && state.selectedRuneId !== null) handleRuneClick(state.selectedRuneId);
}

document.addEventListener("pointerdown", onRunePointerDown);
window.addEventListener("pointermove", onRunePointerMove);
window.addEventListener("pointerup", onRunePointerUp);
window.addEventListener("pointercancel", onRunePointerCancel);

window.addEventListener("resize", () => {
  scene = null; // re-measure and rebuild the scene at the new integer scale
});

window.addEventListener("keydown", (e) => {
  if (e.key === "m" || e.key === "M") {
    cycleMode();
  } else if (e.key === "r" || e.key === "R") {
    // Hard reset (wipes upgrades) — only from menus, never mid-combat
    if (state.screen !== "combat") restart();
  }
});

// ---------------------------------------------------------------------------
// Bootstrap — you start straight in combat with the base build
// ---------------------------------------------------------------------------
newGame();
startRun();
requestAnimationFrame(rafLoop);
</script>
</body>
</html>
