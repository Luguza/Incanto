<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Rune Circle Combat — Prototype</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #141018;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: #f5f2ff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app { width: 100%; height: 100vh; height: 100dvh; display: flex; align-items: center; justify-content: center; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

  /* Loadout screen */
  .loadout-screen { padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom); }
  .loadout-screen h1 {
    font-size: clamp(22px, 6vw, 28px); margin-bottom: 20px; text-align: center;
    letter-spacing: 0.5px;
  }
  .cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; width: min(320px, 85vw); }
  .card {
    background: linear-gradient(160deg, #262033, #1d1827);
    border: 1px solid #3a3550; border-radius: 12px;
    padding: 14px 20px; text-align: center;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
  }
  .card .it { font-size: 20px; font-weight: 600; color: #f2c14e; letter-spacing: 0.4px; }
  .card .dash { color: rgba(242, 193, 78, 0.45); margin: 4px 0; font-size: 12px; }
  .card .en { font-size: 18px; color: #eae6f5; }
  .fight-btn {
    font-size: 22px; padding: 16px 0; width: min(320px, 85vw);
    border-radius: 12px; border: none;
    background: linear-gradient(180deg, #ffd571, #f2c14e);
    color: #141018; font-weight: 700; letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 0 24px rgba(242, 193, 78, 0.25);
  }
  .fight-btn:active { background: #ffd571; }
  .mode-btn {
    background: rgba(242, 193, 78, 0.07);
    border: 1px solid rgba(242, 193, 78, 0.65); color: #f2c14e;
    border-radius: 9px; padding: 10px 16px; font-weight: 700;
    font-size: clamp(13px, 3.5vw, 16px); letter-spacing: 1px; cursor: pointer;
  }
  .mode-btn:active { background: rgba(242, 193, 78, 0.15); }
  .loadout-screen .mode-btn { margin-top: 20px; }

  /* Combat screen — banner (fight) on top, rune circle filling the rest */
  .combat-screen {
    position: relative;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    width: 100%; height: 100%;
  }
  .combat-screen::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: rgba(229, 72, 77, 0); transition: none;
  }
  .combat-screen.wrong-flash::after { background: rgba(229, 72, 77, 0.35); }

  canvas.scene {
    flex: 0 0 auto;
    display: block;
    width: 100%;
    aspect-ratio: 240 / 108;
    max-height: 28vh;
    object-fit: cover;
    image-rendering: pixelated;
    background: #17131e;
  }
  .hud-under {
    flex: 0 0 auto;
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px max(3vw, env(safe-area-inset-left)) 8px max(3vw, env(safe-area-inset-right));
    background: #1b1624;
    border-top: 1px solid #3a3550;
    border-bottom: 1px solid #3a3550;
  }
  .hud-under .stats { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .combat-mode-row {

  }
  .heart { font-size: clamp(15px, 4vw, 24px); margin-right: 1px; }
  .heart.full { color: #e5484d; text-shadow: 0 0 8px rgba(229, 72, 77, 0.55); }
  .heart.empty { color: #3a3540; }
  .enemy-hp { font-size: clamp(13px, 3.5vw, 18px); color: #cfc9de; }
  .windup-track {
    width: clamp(90px, 26vw, 280px); height: 14px;
    background: #241f2f; border: 1px solid #3a3550; border-radius: 7px;
    overflow: hidden;
  }
  .windup-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #a83a49, #e5484d, #f2784e);
  }
  .windup-track.warp-slow .windup-fill { background: linear-gradient(90deg, #3d6fb8, #4d9fff); }
  .windup-track.warp-freeze .windup-fill { background: #4d9fff; }

  /* Time-warp feedback while a rune is selected */
  .time-veil {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    opacity: 0; transition: opacity 120ms linear;
  }
  .time-veil.slowmo { opacity: 1; background: radial-gradient(ellipse at center, rgba(77, 159, 255, 0.05), rgba(77, 159, 255, 0.16)); }
  .time-veil.freeze { opacity: 1; background: radial-gradient(ellipse at center, rgba(77, 159, 255, 0.10), rgba(77, 159, 255, 0.26)); }
  .time-chip {
    font-size: clamp(11px, 3vw, 13px); font-weight: 700; letter-spacing: 0.5px;
    visibility: hidden; min-height: 1.2em;
  }
  .time-chip.rt { visibility: visible; color: #e5484d; }
  .time-chip.warped { visibility: visible; color: #8fc2ff; }
  .time-chip.idle { visibility: visible; color: #6d6684; font-weight: 600; }

  svg.arena {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: block;
  }
  .ring { fill: none; stroke: #f2c14e; }
  .ring.outer { opacity: 0.22; stroke-width: 1.2; stroke-dasharray: 3 9; }
  .ring.mid { opacity: 0.10; stroke-width: 1; }
  .slot-mark { fill: #f2c14e; opacity: 0.30; }
  .hexagram { fill: none; stroke: #f2c14e; opacity: 0.05; stroke-width: 1; }
  .rune .halo { opacity: 0; fill: #f2c14e; transition: opacity 150ms linear; pointer-events: none; }
  .rune.selected .halo { opacity: 0.5; }
  .rune.matched .halo { opacity: 0.25; fill: #5ecf8f; }
  .rune .body { stroke-width: 2; cursor: pointer; transition: fill 100ms linear; }
  .rune.unmatched .body { fill: url(#gradUnmatched); stroke: #6f668f; }
  .rune.selected .body { fill: url(#gradSelected); stroke: #ffe9b0; }
  .rune.matched .body { fill: url(#gradMatched); stroke: #8fe7b4; }
  .rune text {
    fill: #efeaff; font-size: 16px; letter-spacing: 0.3px;
    text-anchor: middle; dominant-baseline: central;
    pointer-events: none;
  }
  .rune.selected text, .rune.matched text { fill: #161222; font-weight: 600; }
  .chord-glow { stroke: #f2c14e; stroke-width: 9; stroke-linecap: round; opacity: 0.22; }
  .chord { stroke: #ffd571; stroke-width: 3.5; stroke-linecap: round; }
  .chord.flash { stroke: #ffffff; stroke-width: 6; }
  .chord-glow.flash { stroke: #ffffff; opacity: 0.6; }

  /* End screens */
  .end-screen { cursor: pointer; padding: 16px; text-align: center; }
  .end-screen h1 { font-size: clamp(32px, 9vw, 44px); margin-bottom: 12px; letter-spacing: 1px; }
  .end-screen h1.victory { color: #f2c14e; text-shadow: 0 0 28px rgba(242, 193, 78, 0.45); }
  .end-screen h1.defeat { color: #e5484d; text-shadow: 0 0 28px rgba(229, 72, 77, 0.4); }
  .end-screen p { font-size: clamp(15px, 4.5vw, 18px); color: #cfc9de; margin: 4px 0; }
  .end-screen .hint { margin-top: 24px; color: #8a8398; }

<body>
<div id="app"></div>
<script>
"use strict";

// ---------------------------------------------------------------------------
// CONFIG — every gameplay number, flag, and color lives here.
// ---------------------------------------------------------------------------
const CONFIG = {
  windupDurationMs: 8000,
  slowMoFactor: 0.3,
  playerHearts: 5,
  enemyHP: 3,
  heartLossPerWrongMatch: 1,
  heartLossPerFullWindup: 1,
  enemyDamagePerCast: 1,
  runeCount: 6,
  pairsPerLoadout: 3,
  staggerOnCast: true,
  wrongFlashDurationMs: 200,
  shapeFlashDurationMs: 500,
  fireballFlightMs: 450,
  fireballImpactMs: 280,
  circleCenter: { x: 300, y: 300 },
  circleRadius: 215,
  runeRadius: 48,
  colors: {
    background: "#141018",
    runeUnmatched: "#3a3550",
    runeSelected: "#f2c14e",

    wrongFlash: "rgba(229,72,77,0.35)",

    heartEmpty: "#3a3540",
    windupFill: "#e5484d",

    dungeon: {

      brickCrack: "#211a2b",
      moss: "#3d5240",
      mossDark: "#31422f",
      floorDark: "#1e1828",
      slabA: "#2b2436",
      slabB: "#251f30",
      slabEdge: "#3c3350",
      torchMetal: "#4e4863",
      torchWood: "#6b4a2e",
      flame: ["#a8432c", "#e5673a", "#f2a83a", "#ffe28a", "#fff7d9"],
      glowRGB: "242, 168, 58",
      glowAlpha: 0.18,
      vignette: "rgba(10, 7, 15, 0.45)",
    },
    mage: {
      o: "#231647", // outline
      A: "#7c4dff", // hat/robe mid
      a: "#5a35c8", // hat/robe shade
      h: "#9d78ff", // highlight
      B: "#f2c14e", // gold trim
      b: "#b8862c", // gold shade
      S: "#ecc39a", // skin
      s: "#c99a72", // skin shade
      E: "#231647", // eyes
      W: "#e5e0f0", // beard
      w: "#b0a8c8", // beard shade
      R: "#6742e0", // robe mid
      r: "#4c2fae", // robe shade
      D: "#38217e", // robe dark / boots
      T: "#8a5a33", // staff wood
      t: "#5f3c20", // staff wood dark
      Y: "#fff1b0", // orb core
      y: "#f2a83a", // orb rim
    },
    skeleton: {
      o: "#26232e", // outline
      W: "#e8e4da", // bone light
      G: "#b8b2a4", // bone mid
      g: "#8a8478", // bone dark
      K: "#141018", // socket
      R: "#e5484d", // eye glow
    },
    skeletonHit: {
      o: "#ffd98a", W: "#fff7dc", G: "#ffefc0", g: "#ffd98a", K: "#fff7dc", R: "#ffffff",
    },
    fireball: {
      C: "#fff7d9", // core
      Y: "#ffe28a", // inner
      y: "#f2a83a", // mid
      O: "#e5673a", // outer
      T: "#a8432c", // trail
      glowRGB: "242, 168, 58",
      glowAlpha: 0.3,
    },
  },
};

const MODE_ORDER = ["REAL_TIME", "SLOW_MO", "FREEZE"];
const MODE_LABELS = { REAL_TIME: "REAL-TIME", SLOW_MO: "SLOW-MO", FREEZE: "FREEZE" };

// ---------------------------------------------------------------------------
// Word pool — 12 A1 Italian-English pairs, drawn in order and cycled.
// ---------------------------------------------------------------------------
const WORD_POOL = [
  { it: "la casa", en: "house" },
  { it: "il gatto", en: "cat" },
  { it: "il cane", en: "dog" },
  { it: "il pane", en: "bread" },
  { it: "la mela", en: "apple" },
  { it: "l'acqua", en: "water" },
  { it: "il libro", en: "book" },
  { it: "la sedia", en: "chair" },
  { it: "il tavolo", en: "table" },
  { it: "la porta", en: "door" },
  { it: "la finestra", en: "window" },
  { it: "il sole", en: "sun" },
];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let state = null;

function freshState() {
  return {
    screen: "loadout",      // loadout | combat | victory | defeat
    mode: "REAL_TIME",
    runes: [],               // {id, pairId, lang, word, x, y, matchState}
    selectedRuneId: null,
    chords: [],              // {x1,y1,x2,y2,pairId}
    currentPairs: [],
    hearts: CONFIG.playerHearts,
    enemyHP: CONFIG.enemyHP,
    windup: 0,
    poolIndex: 0,
    wrongMatchCount: 0,
    clockMs: 0,               // internal clock warped by mode+selection, drives windup + instrumentation
    realFightStartMs: 0,      // wall-clock time, used only for the end-screen summary
    pairAvailableAtClockMs: {},
    wrongFlashUntil: 0,
    shapeFlashUntil: 0,
    fireballAt: 0,
    pendingRefill: false,
    _structuralDirty: false, // set true whenever runes/chords/screen need a full DOM rebuild
  };
}

function newGame() {
  const preservedMode = state ? state.mode : "REAL_TIME"; // DECISION: mode is a tester tool, preserved across restart
  state = freshState();
  state.mode = preservedMode;
  state.loadoutPairs = drawLoadout();
}

// ---------------------------------------------------------------------------
// Geometry
// ---------------------------------------------------------------------------
function layoutCircle(n) {
  // DECISION: angle slots are fixed (stable layout); only word-to-slot assignment is shuffled.
  const { x: cx, y: cy } = CONFIG.circleCenter;
  const r = CONFIG.circleRadius;
  const positions = [];
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + (i * 2 * Math.PI) / n;
    positions.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
  }
  return positions;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ---------------------------------------------------------------------------
// Pixel-art dungeon scene.
// DECISION: pixel art is authored as character maps but rendered to a <canvas>
// at a fixed 240x108 native resolution and upscaled with
// image-rendering: pixelated. The static scene (dungeon + fighters) is drawn
// once to an offscreen canvas; each frame just blits it and overlays dynamic
// effects (fireball, hit flash). No image assets; single-file constraint holds.
// ---------------------------------------------------------------------------
const SCENE_W = 240;
const SCENE_H = 108;
const FLOOR_Y = 84;
const MAGE_POS = { x: 30, y: FLOOR_Y - 32 };
const SKEL_POS = { x: 186, y: FLOOR_Y - 31 };
const STAFF_TIP = { x: MAGE_POS.x + 20, y: MAGE_POS.y + 14 }; // the staff orb
const SKEL_CHEST = { x: SKEL_POS.x + 10, y: SKEL_POS.y + 14 };

const MAGE_SPRITE = [
  "..............o.........",
  ".............oho........",
  ".............ohao.......",
  "............ohAao.......",
  "............ohAaao......",
  "...........ohAAaao......",
  "...........ohAAaaao.....",
  "..........ohAAAaaao.....",
  "..........ohAAAaaaao....",
  ".........ohAAAAaaaao....",
  "......oohhAAAAAaaaoo....",
  ".....oBBBBBBBBBBBBBBo...",
  "......oobSSSSSsoo.o.....",
  "........oSESSSEso..yYy..",
  "........oSSSSSsso..YYY..",
  ".......oWSSssssWo..yYy..",
  ".......oWWWWWWWwo...oto.",
  "......oRWWWWWWwo....oto.",
  ".....ohRRoWWWwo.....oTo.",
  "....ohRRRRowwo......oTo.",
  "....ohRRRRRRo.......oTo.",
  "...ohRRRRRRRRo......oTo.",
  "...ohRRRRRRRRRoo...oTTo.",
  "...oRRRRRRRRRRRSso.oTo..",
  "..ohRRRRRRRRRRRoSsoTo...",
  "..ohRRRRRRRRRRRooSTo....",
  "..oRRRRRRRRRRRRo.oTo....",
  "..orRRRRRRRRRRro.oTo....",
  ".oBBBBBBBBBBBBBBooTo....",
  ".obbbbbbbbbbbbbbo.oTo...",
  ".orrrrrrrrrrrrrro.oTo...",
  ".oDDDDDDDDDDDDDDo.oTo...",
  "..oDDoo....ooDDo..oTo...",
  "..oooo......oooo..ooo...",
];

const SKELETON_SPRITE = [
  "......ooooo.........",
  ".....oWWWWWo........",
  "....oWWWWWWWo.......",
  "....oWWWWWWWGo......",
  "....oKKoWWoKKo......",
  "....oKRoWWoKRo......",
  "....oWWWWWWWWo......",
  ".....oWgWgWGo.......",
  ".....ogWgWgWo.......",
  "......oWWWWo........",
  ".......oGGo.........",
  "....ooWWWWWWoo......",
  "...oWGoWWWWoGWo.....",
  "...oWo.oGGo.oWo.....",
  "...oWo.WWWW.oWo.....",
  "...oGoWWggWWoGo.....",
  "...oWo.WWWW.oWo.....",
  "...oWoWWggWWoWo.....",
  "...ogo.WWWW.ogo.....",
  "..oWWo..GG..oWWo....",
  "..oWo..oWWo..oWo....",
  "......oWWWWo........",
  ".....oWWooWWo.......",
  ".....oWo..oWo.......",
  ".....oGo..oGo.......",
  ".....oWo..oWo.......",
  ".....oWo..oWo.......",
  ".....ogo..ogo.......",
  ".....oWo..oWo.......",
  "....oWWo..oWWo......",
  "...oWWWo..oWWWo.....",
  "...ooooo..ooooo.....",
];

const FIREBALL_SPRITE = [
  "....OOO...",
  "..TOYYYO..",
  "TTOYYCCYO.",
  ".TOyYCCYO.",
  "..TOYYYOO.",
  "....OOO...",
];

function drawSpritePx(ctx, map, palette, ox, oy) {
  for (let y = 0; y < map.length; y++) {
    for (let x = 0; x < map[y].length; x++) {
      const c = map[y][x];
      if (c !== "." && palette[c]) {
        ctx.fillStyle = palette[c];
        ctx.fillRect(ox + x, oy + y, 1, 1);
      }
    }
  }
}

// Deterministic per-brick hash so detail placement is stable across rebuilds
function brickHash(a, b) {
  let h = (a * 73856093) ^ (b * 19349663);
  h = (h ^ (h >> 13)) * 1274126177;
  return Math.abs(h ^ (h >> 16));
}

// Pixel-granular radial glow with linear falloff, blended additively so it
// brightens the wall instead of muddying it
function drawGlow(ctx, cx, cy, radius, rgb, maxAlpha) {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (let py = -radius; py <= radius; py++) {
    for (let px = -radius; px <= radius; px++) {
      const dist = Math.sqrt(px * px + py * py);
      if (dist > radius) continue;
      const a = maxAlpha * (1 - dist / radius);
      if (a < 0.015) continue;
      ctx.fillStyle = `rgba(${rgb}, ${a.toFixed(3)})`;
      ctx.fillRect(cx + px, cy + py, 1, 1);
    }
  }
  ctx.restore();
}

let sceneStaticCanvas = null;

function buildStaticScene() {
  const d = CONFIG.colors.dungeon;
  const cv = document.createElement("canvas");
  cv.width = SCENE_W;
  cv.height = SCENE_H;
  const ctx = cv.getContext("2d");

  // Wall: mortar base + brick courses with deterministic shade variation
  ctx.fillStyle = d.mortar;
  ctx.fillRect(0, 0, SCENE_W, FLOOR_Y);
  const BW = 14, BH = 7;
  for (let row = 0; row * BH < FLOOR_Y; row++) {
    const y = row * BH;
    const offset = row % 2 === 0 ? 0 : -Math.floor(BW / 2);
    for (let col = 0; col * BW + offset < SCENE_W; col++) {
      const x = col * BW + offset;
      const h = brickHash(row, col);
      ctx.fillStyle = d.brickShades[h % d.brickShades.length];
      ctx.fillRect(x, y, BW - 1, BH - 1);
      // top-edge highlight for depth
      ctx.fillStyle = "rgba(255,255,255,0.03)";
      ctx.fillRect(x, y, BW - 1, 1);
      // occasional crack
      if (h % 7 === 0) {
        ctx.fillStyle = d.brickCrack;
        const cx = x + 2 + (h % (BW - 5));
        ctx.fillRect(cx, y + 1, 1, 2);
        ctx.fillRect(cx + 1, y + 3, 1, 2);
      }
      // moss creeps up the lower wall
      if (y > FLOOR_Y - 28 && h % 5 === 0) {
        ctx.fillStyle = h % 2 === 0 ? d.moss : d.mossDark;
        ctx.fillRect(x + (h % (BW - 3)), y + BH - 2, 2, 1);
        ctx.fillRect(x + (h % (BW - 4)), y + BH - 3, 1, 1);
      }
    }
  }

  // Floor: dark base, slab rows with edge highlights (subtle perspective:
  // nearer slabs are taller)
  ctx.fillStyle = d.floorDark;
  ctx.fillRect(0, FLOOR_Y, SCENE_W, SCENE_H - FLOOR_Y);
  ctx.fillStyle = d.slabEdge;
  ctx.fillRect(0, FLOOR_Y, SCENE_W, 1);
  let y = FLOOR_Y + 1;
  let slabH = 7;
  let rowIdx = 0;
  while (y < SCENE_H) {
    const offset = rowIdx % 2 === 0 ? 0 : -11;
    const slabW = 24;
    for (let col = 0; col * slabW + offset < SCENE_W; col++) {
      const x = col * slabW + offset;
      const h = brickHash(rowIdx + 100, col);
      ctx.fillStyle = h % 2 === 0 ? d.slabA : d.slabB;
      ctx.fillRect(x, y, slabW - 1, slabH - 1);
      ctx.fillStyle = "rgba(255,255,255,0.04)";
      ctx.fillRect(x, y, slabW - 1, 1);
    }
    y += slabH;
    slabH += 3;
    rowIdx++;
  }

  // Torches with layered flames and a warm glow halo
  for (const tx of [68, 162]) {
    const ty = 34;
    const fl = d.flame;
    drawGlow(ctx, tx, ty - 2, 17, d.glowRGB, d.glowAlpha);
    // metal sconce + wood
    ctx.fillStyle = d.torchMetal;
    ctx.fillRect(tx - 1, ty + 6, 4, 2);
    ctx.fillStyle = d.torchWood;
    ctx.fillRect(tx, ty + 2, 2, 6);
    // flame: layered teardrop
    ctx.fillStyle = fl[1];
    ctx.fillRect(tx - 1, ty - 4, 4, 5);
    ctx.fillRect(tx, ty - 6, 2, 2);
    ctx.fillStyle = fl[2];
    ctx.fillRect(tx, ty - 4, 2, 4);
    ctx.fillRect(tx, ty - 5, 1, 1);
    ctx.fillStyle = fl[3];
    ctx.fillRect(tx, ty - 2, 2, 2);
    ctx.fillStyle = fl[4];
    ctx.fillRect(tx, ty - 1, 1, 1);
  }

  // Fighters
  drawSpritePx(ctx, MAGE_SPRITE, CONFIG.colors.mage, MAGE_POS.x, MAGE_POS.y);
  drawSpritePx(ctx, SKELETON_SPRITE, CONFIG.colors.skeleton, SKEL_POS.x, SKEL_POS.y);

  // Soft shadows under the fighters
  ctx.fillStyle = "rgba(10, 7, 15, 0.5)";
  ctx.fillRect(MAGE_POS.x + 2, FLOOR_Y + 1, 20, 2);
  ctx.fillRect(SKEL_POS.x + 3, FLOOR_Y + 1, 14, 2);

  // Vignette: darken top of the wall and bottom of the floor
  ctx.fillStyle = d.vignette;
  ctx.fillRect(0, 0, SCENE_W, 5);
  ctx.fillRect(0, 0, SCENE_W, 2);
  ctx.fillRect(0, SCENE_H - 4, SCENE_W, 4);

  return cv;
}

function renderScene(now) {
  const cv = document.getElementById("scene");
  if (!cv) return;
  const ctx = cv.getContext("2d");
  if (!sceneStaticCanvas) sceneStaticCanvas = buildStaticScene();
  ctx.drawImage(sceneStaticCanvas, 0, 0);

  // Fireball cast: staff -> skeleton on wall-clock time (presentation only,
  // FREEZE doesn't stop it), then a white-hot hit flash with a burst ring.
  if (!state.fireballAt) return;
  const t = now - state.fireballAt;
  const flight = CONFIG.fireballFlightMs;
  const f = CONFIG.colors.fireball;
  if (t <= flight) {
    const p = t / flight;
    const x = STAFF_TIP.x + (SKEL_CHEST.x - STAFF_TIP.x) * p;
    const y = STAFF_TIP.y + (SKEL_CHEST.y - STAFF_TIP.y) * p - Math.sin(p * Math.PI) * 12;
    drawGlow(ctx, Math.round(x), Math.round(y), 9, f.glowRGB, f.glowAlpha);
    drawSpritePx(ctx, FIREBALL_SPRITE, f, Math.round(x) - 5, Math.round(y) - 3);
  } else if (t <= flight + CONFIG.fireballImpactMs) {
    const q = (t - flight) / CONFIG.fireballImpactMs;
    if (Math.floor((t - flight) / 70) % 2 === 0) {
      drawSpritePx(ctx, SKELETON_SPRITE, CONFIG.colors.skeletonHit, SKEL_POS.x, SKEL_POS.y);
    }
    // expanding burst ring
    const r = Math.round(3 + q * 12);
    ctx.fillStyle = f.y;
    ctx.fillRect(SKEL_CHEST.x - r, SKEL_CHEST.y, 2, 1);
    ctx.fillRect(SKEL_CHEST.x + r, SKEL_CHEST.y, 2, 1);
    ctx.fillRect(SKEL_CHEST.x, SKEL_CHEST.y - r, 1, 2);
    ctx.fillRect(SKEL_CHEST.x, SKEL_CHEST.y + r, 1, 2);
    ctx.fillStyle = f.O;
    ctx.fillRect(SKEL_CHEST.x - r + 2, SKEL_CHEST.y - r + 2, 1, 1);
    ctx.fillRect(SKEL_CHEST.x + r - 2, SKEL_CHEST.y - r + 2, 1, 1);
    ctx.fillRect(SKEL_CHEST.x - r + 2, SKEL_CHEST.y + r - 2, 1, 1);
    ctx.fillRect(SKEL_CHEST.x + r - 2, SKEL_CHEST.y + r - 2, 1, 1);
  } else {
    state.fireballAt = 0;
  }
}

// ---------------------------------------------------------------------------
// Word pool / circle population
// ---------------------------------------------------------------------------
function drawLoadout() {
  const pairs = [];
  for (let i = 0; i < CONFIG.pairsPerLoadout; i++) {
    const idx = (state.poolIndex + i) % WORD_POOL.length;
    pairs.push({ id: idx, it: WORD_POOL[idx].it, en: WORD_POOL[idx].en });
  }
  state.poolIndex = (state.poolIndex + CONFIG.pairsPerLoadout) % WORD_POOL.length;
  return pairs;
}

function populateCircle(pairs) {
  const slots = layoutCircle(CONFIG.runeCount);
  const contents = [];
  pairs.forEach((p) => {
    contents.push({ pairId: p.id, lang: "it", word: p.it });
    contents.push({ pairId: p.id, lang: "en", word: p.en });
  });
  shuffleArray(contents);

  state.runes = contents.map((c, i) => ({
    id: i,
    pairId: c.pairId,
    lang: c.lang,
    word: c.word,
    x: slots[i].x,
    y: slots[i].y,
    matchState: "unmatched",
  }));
  state.chords = [];
  state.selectedRuneId = null;
  state.currentPairs = pairs;
  pairs.forEach((p) => {
    state.pairAvailableAtClockMs[p.id] = state.clockMs;
  });
  state._structuralDirty = true;
}

function beginCombat() {
  state.screen = "combat";
  state.realFightStartMs = performance.now();
  populateCircle(state.loadoutPairs);
}

// ---------------------------------------------------------------------------
// Combat logic
// ---------------------------------------------------------------------------
function handleRuneClick(id) {
  if (state.screen !== "combat") return;
  const rune = state.runes.find((r) => r.id === id);
  if (!rune) return;
  if (rune.matchState === "matched") return; // DECISION: clicking a matched rune is a no-op

  if (state.selectedRuneId === id) {
    rune.matchState = "unmatched";
    state.selectedRuneId = null;
    state._structuralDirty = true;
    return;
  }

  if (state.selectedRuneId === null) {
    rune.matchState = "selected";
    state.selectedRuneId = id;
    state._structuralDirty = true;
    return;
  }

  const first = state.runes.find((r) => r.id === state.selectedRuneId);
  const correct = first.pairId === rune.pairId;
  const now = performance.now();
  const availableAt = state.pairAvailableAtClockMs[first.pairId] ?? state.clockMs;
  const secondsAvailable = ((state.clockMs - availableAt) / 1000).toFixed(1);
  logAttempt(correct, first, rune, secondsAvailable);
  state._structuralDirty = true;

  if (correct) {
    first.matchState = "matched";
    rune.matchState = "matched";
    state.chords.push({ x1: first.x, y1: first.y, x2: rune.x, y2: rune.y, pairId: rune.pairId });
    state.selectedRuneId = null;
    if (state.chords.length >= CONFIG.pairsPerLoadout) {
      onShapeComplete(now);
    }
  } else {
    state.wrongMatchCount++;
    first.matchState = "unmatched";
    state.selectedRuneId = null;
    state.wrongFlashUntil = now + CONFIG.wrongFlashDurationMs;
    hitPlayer(CONFIG.heartLossPerWrongMatch);
  }
}

function onShapeComplete(now) {
  // NOTE: per the design's actual geometry, the 3 completed chords are three
  // straight lines connecting distinct rune positions on the circle — not a
  // literal triangle polygon. That trio of chords lighting up together *is*
  // the "shape"; no extra geometry is constructed.
  state.shapeFlashUntil = now + CONFIG.shapeFlashDurationMs;
  state.fireballAt = now;
  hitEnemy(CONFIG.enemyDamagePerCast);
  if (state.screen !== "combat") return; // victory may have just triggered
  if (CONFIG.staggerOnCast) state.windup = 0;
  state.pendingRefill = true;
}

function hitPlayer(n) {
  state.hearts = Math.max(0, state.hearts - n);
  if (state.hearts <= 0 && state.screen === "combat") state.screen = "defeat";
}

function hitEnemy(n) {
  state.enemyHP = Math.max(0, state.enemyHP - n);
  if (state.enemyHP <= 0 && state.screen === "combat") state.screen = "victory";
}

function logAttempt(correct, first, second, secondsAvailable) {
  console.log(
    `[${new Date().toISOString()}] mode=${state.mode} pair="${first.word} / ${second.word}" ` +
    `result=${correct ? "correct" : "wrong"} availableFor=${secondsAvailable}s`
  );
}

function cycleMode() {
  const idx = (MODE_ORDER.indexOf(state.mode) + 1) % MODE_ORDER.length;
  state.mode = MODE_ORDER[idx];
}

function restart() {
  newGame();
  beginCombat(); // DECISION: restart re-enters combat directly, skipping the one-time loadout screen
}

// ---------------------------------------------------------------------------
// Game loop — the only place mode/selection-dependent timing branches exist.
// ---------------------------------------------------------------------------
function getEffectiveDt(rawDt) {
  if (state.selectedRuneId === null) return rawDt; // idle time always runs at full speed, in all 3 modes
  switch (state.mode) {
    case "REAL_TIME": return rawDt;
    case "SLOW_MO": return rawDt * CONFIG.slowMoFactor;
    case "FREEZE": return 0;
    default: return rawDt;
  }
}

let lastRafNow = null;
function rafLoop(now) {
  if (lastRafNow === null) lastRafNow = now;
  const rawDt = now - lastRafNow;
  lastRafNow = now;

  if (state.screen === "combat") {
    const effectiveDt = getEffectiveDt(rawDt);
    state.clockMs += effectiveDt;
    state.windup += effectiveDt / CONFIG.windupDurationMs;
    if (state.windup >= 1) {
      state.windup = 0;
      hitPlayer(CONFIG.heartLossPerFullWindup);
    }
    if (state.pendingRefill && state.screen === "combat" && now >= state.shapeFlashUntil) {
      state.pendingRefill = false;
      populateCircle(drawLoadout());
    }
  }

  render(now);
  requestAnimationFrame(rafLoop);
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
// DECISION: the DOM is only rebuilt on actual state changes (screen switch,
// rune/chord structure change). Continuous per-frame animation (windup bar,
// flash timers, HUD text) is patched directly on existing nodes instead of
// replacing the whole tree every rAF tick — rebuilding ~60x/sec would tear
// down interactive elements (e.g. the Fight button) out from under real
// clicks, since a click can land in the gap between two rebuilds.
const app = document.getElementById("app");
let builtScreen = null;

function render(now) {
  if (state.screen === "loadout") {
    if (builtScreen !== "loadout") {
      renderLoadoutFull();
      builtScreen = "loadout";
    }
    patchLoadoutMode();
  } else if (state.screen === "combat") {
    if (builtScreen !== "combat" || state._structuralDirty) {
      renderCombatFull();
      builtScreen = "combat";
      state._structuralDirty = false;
    }
    patchCombatContinuous(now);
  } else {
    if (builtScreen !== state.screen) {
      renderEndFull(state.screen === "victory" ? "Victory!" : "Defeat");
      builtScreen = state.screen;
    }
    patchEndMode();
  }
}

function renderLoadoutFull() {
  const cards = state.loadoutPairs
    .map(
      (p) => `
    <div class="card">
      <div class="it">${p.it}</div>
      <div class="dash">&#10022;</div>
      <div class="en">${p.en}</div>
    </div>`
    )
    .join("");

  app.innerHTML = `
    <div class="screen loadout-screen">
      <h1>Your runes for this fight</h1>
      <div class="cards">${cards}</div>
      <button class="fight-btn" onclick="beginCombat()">Fight</button>
      <button class="mode-btn" id="loadout-mode-hint" onclick="cycleMode()"></button>
    </div>`;
}

function patchLoadoutMode() {
  const el = document.getElementById("loadout-mode-hint");
  if (el) el.textContent = `MODE: ${MODE_LABELS[state.mode]} — tap to change`;
}

function heartsHtml() {
  return Array.from({ length: CONFIG.playerHearts })
    .map((_, i) => `<span class="heart ${i < state.hearts ? "full" : "empty"}">&#9829;</span>`)
    .join("");
}

function renderCombatFull() {
  const { x: cx, y: cy } = CONFIG.circleCenter;
  const slots = layoutCircle(CONFIG.runeCount);

  // Arcane decoration: dashed outer ring with diamond slot markers, a faint
  // mid ring, and a barely-visible hexagram joining alternating slots.
  const ringR = CONFIG.circleRadius + 18;
  const marks = slots
    .map((s) => {
      const angle = Math.atan2(s.y - cy, s.x - cx);
      const mx = cx + ringR * Math.cos(angle);
      const my = cy + ringR * Math.sin(angle);
      return `<rect class="slot-mark" x="${mx - 3}" y="${my - 3}" width="6" height="6" transform="rotate(45 ${mx} ${my})"/>`;
    })
    .join("");
  const hexagram =
    `<polygon class="hexagram" points="${[0, 2, 4].map((i) => `${slots[i].x},${slots[i].y}`).join(" ")}"/>` +
    `<polygon class="hexagram" points="${[1, 3, 5].map((i) => `${slots[i].x},${slots[i].y}`).join(" ")}"/>`;

  const chordsHtml = state.chords
    .map(
      (c) =>
        `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" class="chord-glow" />` +
        `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" class="chord" />`
    )
    .join("");

  const runesHtml = state.runes
    .map(
      (r) => `
    <g class="rune ${r.matchState}" onclick="handleRuneClick(${r.id})">
      <circle class="halo" cx="${r.x}" cy="${r.y}" r="${CONFIG.runeRadius + 7}" filter="url(#glow)"></circle>
      <circle class="body" cx="${r.x}" cy="${r.y}" r="${CONFIG.runeRadius}"></circle>
      <text x="${r.x}" y="${r.y}">${r.word}</text>
    </g>`
    )
    .join("");

  const arenaDefs = `
    <defs>
      <radialGradient id="gradUnmatched" cx="35%" cy="30%" r="80%">
        <stop offset="0%" stop-color="#4a4463"/><stop offset="100%" stop-color="#2e2841"/>
      </radialGradient>
      <radialGradient id="gradSelected" cx="35%" cy="30%" r="80%">
        <stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#e0a93c"/>
      </radialGradient>
      <radialGradient id="gradMatched" cx="35%" cy="30%" r="80%">
        <stop offset="0%" stop-color="#7fe3a8"/><stop offset="100%" stop-color="#41ad72"/>
      </radialGradient>
      <radialGradient id="bgGlow">
        <stop offset="0%" stop-color="rgba(124,77,255,0.16)"/>
        <stop offset="100%" stop-color="rgba(124,77,255,0)"/>
      </radialGradient>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>
    <circle cx="${cx}" cy="${cy}" r="${CONFIG.circleRadius + 60}" fill="url(#bgGlow)"/>
    <circle class="ring outer" cx="${cx}" cy="${cy}" r="${ringR}"/>
    <circle class="ring mid" cx="${cx}" cy="${cy}" r="${CONFIG.circleRadius - 10}"/>
    ${marks}
    ${hexagram}`;

  app.innerHTML = `
    <div class="screen combat-screen" id="combat-root">
      <canvas class="scene" id="scene" width="${SCENE_W}" height="${SCENE_H}"></canvas>
      <div class="hud-under">
        <div class="hearts" id="hearts"></div>
        <div class="stats">
          <div class="enemy-hp" id="enemy-hp"></div>
          <div class="windup-track" id="windup-track"><div class="windup-fill" id="windup-fill"></div></div>
          <div class="time-chip" id="time-chip"></div>
        </div>
      </div>
      <div class="time-veil" id="time-veil"></div>
      <div class="combat-mode-row">
        <button class="mode-btn" id="mode-label" onclick="cycleMode()"></button>
      </div>
      <svg class="arena" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet">
        ${arenaDefs}
        ${chordsHtml}
        ${runesHtml}
      </svg>
    </div>`;
}

function patchCombatContinuous(now) {
  const root = document.getElementById("combat-root");
  if (!root) return;

  root.classList.toggle("wrong-flash", now < state.wrongFlashUntil);
  document.getElementById("hearts").innerHTML = heartsHtml();
  document.getElementById("mode-label").textContent = `MODE: ${MODE_LABELS[state.mode]} — tap to change`;
  document.getElementById("enemy-hp").textContent = `Enemy HP: ${state.enemyHP} / ${CONFIG.enemyHP}`;

  const windupPct = Math.max(0, Math.min(1, state.windup));
  const fillEl = document.getElementById("windup-fill");
  if (fillEl) fillEl.style.width = (windupPct * 100).toFixed(2) + "%";

  // Time-warp feedback: while a rune is selected, show what time is doing.
  const selected = state.selectedRuneId !== null;
  const veil = document.getElementById("time-veil");
  const chip = document.getElementById("time-chip");
  const track = document.getElementById("windup-track");
  let veilClass = "time-veil";
  let chipClass = "time-chip";
  let chipText = "";
  let trackClass = "windup-track";
  if (selected) {
    if (state.mode === "SLOW_MO") {
      veilClass += " slowmo"; chipClass += " warped"; trackClass += " warp-slow";
      chipText = `TIME ×${CONFIG.slowMoFactor}`;
    } else if (state.mode === "FREEZE") {
      veilClass += " freeze"; chipClass += " warped"; trackClass += " warp-freeze";
      chipText = "TIME FROZEN";
    } else {
      chipClass += " rt";
      chipText = "TIME ×1 — STILL WINDING UP!";
    }
  } else if (state.mode === "SLOW_MO") {
    chipClass += " idle";
    chipText = "hold a rune to slow time";
  } else if (state.mode === "FREEZE") {
    chipClass += " idle";
    chipText = "hold a rune to freeze time";
  }
  veil.className = veilClass;
  chip.className = chipClass;
  chip.textContent = chipText;
  track.className = trackClass;

  renderScene(now);

  const shapeFlashActive = now < state.shapeFlashUntil;
  document.querySelectorAll(".chord, .chord-glow").forEach((el) => el.classList.toggle("flash", shapeFlashActive));
}

let endScreenShownAt = 0;

function renderEndFull(title) {
  const elapsed = ((performance.now() - state.realFightStartMs) / 1000).toFixed(1);
  endScreenShownAt = performance.now();
  app.innerHTML = `
    <div class="screen end-screen" onclick="restartFromTap()">
      <h1 class="${state.screen}">${title}</h1>
      <p>Time: ${elapsed}s &mdash; Wrong matches: ${state.wrongMatchCount}</p>
      <p id="end-mode"></p>
      <p class="hint">Tap anywhere to restart</p>
    </div>`;
}

function restartFromTap() {
  // DECISION: ignore taps in the first 400ms of the end screen so a tap
  // aimed at a rune during the final match doesn't instantly restart.
  if (performance.now() - endScreenShownAt < 400) return;
  restart();
}

function patchEndMode() {
  const el = document.getElementById("end-mode");
  if (el) el.textContent = `Mode: ${MODE_LABELS[state.mode]}`;
}

// ---------------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------------
window.addEventListener("keydown", (e) => {
  if (e.key === "m" || e.key === "M") {
    cycleMode();
  } else if (e.key === "r" || e.key === "R") {
    if (state.screen === "victory" || state.screen === "defeat") restart();
  }
});

// ---------------------------------------------------------------------------
// Bootstrap
// ---------------------------------------------------------------------------
newGame();
requestAnimationFrame(rafLoop);
</script>
</body>
</html>
